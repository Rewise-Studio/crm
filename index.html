<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewise CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--umbra:#6B4F3A;--umbra2:#8a6548;--linen:#F5F0EA;--graphite:#2C2C2C;--muted:#8a7f78;--border:#e0d9d3;--bg:#faf8f6;--card:#fff;--surface:#f5f0ea}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--graphite);min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:340px;text-align:center}
.login-logo{width:52px;height:52px;background:var(--umbra);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--linen);margin:0 auto 16px;letter-spacing:.5px}
.login-input{width:100%;padding:11px 14px;font-size:14px;border:1px solid var(--border);border-radius:10px;font-family:inherit;margin-bottom:12px;background:var(--bg)}
.login-input:focus{outline:none;border-color:var(--umbra)}
.login-btn{width:100%;padding:12px;background:var(--umbra);color:var(--linen);border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500}
.login-btn:hover{background:var(--umbra2)}
.login-err{font-size:12px;color:#a33030;margin-top:8px}
.app{display:none;flex-direction:column;min-height:100vh}
.topnav{background:var(--umbra);padding:0 20px;display:flex;align-items:center;height:52px}
.topnav-brand{display:flex;align-items:center;gap:10px;margin-right:28px}
.topnav-mark{width:30px;height:30px;background:rgba(245,240,234,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--linen);letter-spacing:.3px}
.topnav-name{font-size:13px;font-weight:500;color:var(--linen)}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;color:rgba(245,240,234,.6);cursor:pointer;border-bottom:2px solid transparent}
.nav-tab:hover{color:var(--linen)}
.nav-tab.active{color:var(--linen);border-bottom-color:var(--linen)}
.nav-right{margin-left:auto}
.logout-btn{font-size:12px;color:rgba(245,240,234,.5);cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid rgba(245,240,234,.2)}
.logout-btn:hover{color:var(--linen)}
.page{display:none;padding:20px;max-width:1200px;margin:0 auto;width:100%}
.page.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px}
.stat-val{font-size:26px;font-weight:500;line-height:1}
.stat-accent{color:var(--umbra)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;background:transparent;font-family:inherit;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--umbra);color:var(--graphite)}
.fbtn.active{background:var(--umbra);color:var(--linen);border-color:var(--umbra)}
.search-wrap{position:relative;margin-left:auto}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}
.search-wrap input{padding:7px 12px 7px 32px;font-size:13px;border:1px solid var(--border);border-radius:10px;font-family:inherit;background:var(--card);width:200px}
.search-wrap input:focus{outline:none;border-color:var(--umbra)}
.orders-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.order-row{display:grid;grid-template-columns:110px 1fr 130px 120px 100px 140px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.order-row:last-child{border-bottom:none}
.order-row:hover{background:var(--bg)}
.order-row.hdr{background:var(--surface);cursor:default}
.order-row.hdr:hover{background:var(--surface)}
.cell{padding:12px 14px;font-size:13px;display:flex;align-items:center}
.cell.hdr{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.onum{font-weight:500;color:var(--umbra)}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-new{background:#E6F1FB;color:#185FA5}
.b-work{background:#FAEEDA;color:#854F0B}
.b-ready{background:#EAF3DE;color:#3B6D11}
.b-issued{background:#F1EFE8;color:#5F5E5A}
.b-urgent{background:#FCEBEB;color:#A32D2D}
.b-postponed{background:#F1EFE8;color:#888}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:640px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:500}
.modal-close{cursor:pointer;font-size:22px;color:var(--muted);line-height:1;padding:0 6px;border-radius:4px}
.modal-close:hover{background:var(--bg)}
.modal-body{overflow-y:auto;padding:20px;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--graphite);transition:background .1s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--umbra);color:var(--linen);border-color:var(--umbra)}
.btn-primary:hover{background:var(--umbra2);border-color:var(--umbra2)}
.m-onum{font-size:12px;font-weight:500;color:var(--umbra);margin-bottom:4px}
.m-cname{font-size:18px;font-weight:500;margin-bottom:3px}
.m-phone{font-size:13px;color:var(--muted)}
.m-meta{display:flex;flex-direction:column;gap:5px;font-size:12px;text-align:right;margin-left:auto}
.m-meta-row{color:var(--muted)}
.sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.icard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.icard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.inum-badge{font-size:11px;font-weight:500;color:var(--umbra);background:var(--linen);padding:2px 8px;border-radius:20px}
.itype{font-size:13px;font-weight:500;margin-bottom:3px}
.isvcs{font-size:12px;color:var(--muted);line-height:1.6}
.ifooter{display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px}
.idates{font-size:11px;color:var(--muted);line-height:1.7}
.iprice{font-size:13px;font-weight:500}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.info-cell{background:var(--bg);border-radius:8px;padding:10px 12px}
.info-cell-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .12s}
.ccard:hover{border-color:var(--umbra)}
.cavatar{width:40px;height:40px;border-radius:50%;background:var(--linen);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--umbra);margin-bottom:10px}
.cname{font-size:14px;font-weight:500;margin-bottom:2px}
.cphone{font-size:12px;color:var(--muted);margin-bottom:6px}
.cmeta{font-size:11px;color:var(--muted)}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-title{font-size:13px;font-weight:500;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--muted);width:150px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--bg);border-radius:4px;height:6px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px;background:var(--umbra)}
.bar-val{font-size:12px;color:var(--muted);width:60px;flex-shrink:0}
.rev-big{font-size:32px;font-weight:500;color:var(--umbra);margin-bottom:4px}
.rev-sub{font-size:13px;color:var(--muted)}
.rev-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.rev-cell{background:var(--bg);border-radius:8px;padding:10px 12px}
.rev-cell-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.rev-cell-val{font-size:15px;font-weight:500}
/* Form */
.form-group{margin-bottom:16px}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:block}
.form-input{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;font-family:inherit;background:var(--bg)}
.form-input:focus{outline:none;border-color:var(--umbra)}
.btn-group{display:flex;flex-wrap:wrap;gap:8px}
.item-list-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.item-list-info{flex:1}
.item-list-name{font-size:13px;font-weight:500}
.item-list-meta{font-size:11px;color:var(--muted);margin-top:2px}
.item-list-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px}
.svc-btn{width:100%;text-align:left;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-family:inherit;font-size:13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.svc-btn:hover{background:var(--bg);border-color:var(--umbra)}
.svc-btn.active{background:var(--linen);border-color:var(--umbra)}
.svc-price{color:var(--umbra);font-weight:500;flex-shrink:0;margin-left:8px}
@media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr)}.order-row{grid-template-columns:90px 1fr 100px}.cell:nth-child(4),.cell:nth-child(5),.cell:nth-child(6){display:none}.analytics-grid{grid-template-columns:1fr}.modal{width:95vw}.page{padding:12px}}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">RW</div>
    <div style="font-size:20px;font-weight:500;margin-bottom:4px">Rewise CRM</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Введіть пароль для входу</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Увійти</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="app" id="app">
  <nav class="topnav">
    <div class="topnav-brand">
      <div class="topnav-mark">RW</div>
      <div class="topnav-name">Rewise CRM</div>
    </div>
    <div class="nav-tab active" onclick="showPage('orders',this)">Замовлення</div>
    <div class="nav-tab" onclick="showPage('clients',this)">Клієнти</div>
    <div class="nav-tab" onclick="showPage('analytics',this)">Аналітика</div>
    <div class="nav-right"><div class="logout-btn" onclick="logout()">Вийти</div></div>
  </nav>

  <div class="page active" id="page-orders">
    <div class="stats-row" id="stats-row"></div>
    <div class="toolbar" id="status-filters">
      <button class="fbtn active" onclick="setFilter('all',this)">Усі</button>
      <button class="fbtn" onclick="setFilter('new',this)">🆕 Нові</button>
      <button class="fbtn" onclick="setFilter('work',this)">⚙️ В роботі</button>
      <button class="fbtn" onclick="setFilter('ready',this)">✅ Готові</button>
      <button class="fbtn" onclick="setFilter('issued',this)">📦 Видані</button>
      <div class="search-wrap">
        <span class="search-ico">⌕</span>
        <input type="text" id="search-input" placeholder="Пошук..." oninput="renderOrders()">
      </div>
      <button class="btn" onclick="printPlan()" style="white-space:nowrap">🖨 План</button>
      <button class="btn btn-primary" onclick="openNewOrder()" style="white-space:nowrap">+ Нове замовлення</button>
    </div>
    <div class="toolbar" id="manager-filters" style="margin-top:-6px"></div>
    <div class="orders-wrap">
      <div class="order-row hdr">
        <div class="cell hdr">Номер</div>
        <div class="cell hdr">Клієнт</div>
        <div class="cell hdr">Статус</div>
        <div class="cell hdr">Приймальник</div>
        <div class="cell hdr">Термін</div>
        <div class="cell hdr">Оплата</div>
      </div>
      <div id="orders-body"></div>
    </div>
  </div>

  <div class="page" id="page-clients">
    <div class="toolbar">
      <div class="search-wrap" style="margin-left:0">
        <span class="search-ico">⌕</span>
        <input type="text" id="client-search" placeholder="Пошук клієнта..." oninput="renderClients()">
      </div>
    </div>
    <div class="clients-grid" id="clients-grid"></div>
  </div>

  <div class="page" id="page-analytics">
    <div class="stats-row" id="analytics-stats"></div>
    <div class="chart-card" style="margin-bottom:16px">
      <div class="chart-title">Обіг</div>
      <div id="revenue-block"></div>
    </div>
    <div class="analytics-grid" id="analytics-grid"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const PWD_HASH = "70775e2a6abd151f90d68ec1cc3b5bad65e57f7c545b6790e744de1e4b7db78a";
const SHEET_ID = "1kDJ893PFa_DTNKt-r8wQES_JFXbJSDNU8niRLz70Aao";
const API_URL = "https://price-production-97b5.up.railway.app/order";

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function hashStr(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function doLogin() {
  const h = await hashStr(document.getElementById("pwd-input").value);
  if (h === PWD_HASH) {
    document.getElementById("login-wrap").style.display = "none";
    document.getElementById("app").style.display = "flex";
    sessionStorage.setItem("rw_auth","1");
    loadData();
  } else {
    document.getElementById("login-err").textContent = "Невірний пароль";
  }
}

if (sessionStorage.getItem("rw_auth") === "1") {
  document.getElementById("login-wrap").style.display = "none";
  document.getElementById("app").style.display = "flex";
  loadData();
}

function logout() { sessionStorage.removeItem("rw_auth"); location.reload(); }

// ─── DATA ─────────────────────────────────────────────────────────────────────
let ORDERS = [], ITEMS = [], PARTNERS = [], currentFilter = "all", currentManager = "all";

function gv(obj, ...keys) {
  for (const k of keys) { if (obj[k] !== undefined && obj[k] !== "") return obj[k]; }
  return "";
}

async function loadData() {
  try {
    const [r1, r2, r3] = await Promise.all([
      fetch("https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&sheet=%D0%97%D0%B0%D0%BC%D0%BE%D0%B2%D0%BB%D0%B5%D0%BD%D0%BD%D1%8F"),
      fetch("https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&sheet=%D0%92%D0%B8%D1%80%D0%BE%D0%B1%D0%B8"),
      fetch("https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&sheet=%D0%9F%D0%B0%D1%80%D1%82%D0%BD%D0%B5%D1%80%D0%B8")
    ]);
    ORDERS = await parseSheet(r1, ["Номер замовлення","Дата створення","Приймальник","Ім'я клієнта","Телефон","Оплата","Термін","Статус"]);
    ITEMS = await parseSheet(r2, ["Номер замовлення","Номер виробу","Тип","Бренд","Послуги","Сума","Статус","Дата прийому","Дата в роботі","Дата готово","Дата видачі"]);
    PARTNERS = await parsePartners(r3);
    if (!PARTNERS.length) PARTNERS = ["Сергей"];
  } catch(e) {
    console.error("loadData error:", e);
    PARTNERS = ["Сергей"];
  }
  renderAll();
}

async function parseSheet(res, cols) {
  try {
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, "$1"));
    if (!json.table || !json.table.rows) return [];
    return json.table.rows.map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        const cell = row.c[i];
        obj[col] = cell ? (cell.f || (cell.v !== null ? String(cell.v) : "")) : "";
      });
      return obj;
    }).filter(r => r[cols[0]] && r[cols[0]].startsWith("RW-"));
  } catch(e) { return []; }
}

async function parsePartners(res) {
  try {
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, "$1"));
    if (!json.table || !json.table.rows) return [];
    return json.table.rows.map(row => {
      const cell = row.c[0];
      return cell && cell.v ? String(cell.v) : "";
    }).filter(v => v && v !== "Імя" && v !== "Имя");
  } catch(e) { return []; }
}

function extractAmt(str) {
  if (!str || typeof str !== "string") return 0;
  const m = str.replace(/\s/g, "").match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function getStatus(num) {
  const items = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  if (!items.length) return "new";
  if (items.every(i => gv(i,"Статус") === "📦 Виданий")) return "issued";
  if (items.some(i => gv(i,"Статус") === "✅ Готово")) return "ready";
  if (items.some(i => gv(i,"Статус") === "⚙️ В роботі")) return "work";
  return "new";
}

function statusBadge(num) {
  const st = getStatus(num);
  const m = {new:["🆕 Новий","b-new"],work:["⚙️ В роботі","b-work"],ready:["✅ Готово","b-ready"],issued:["📦 Виданий","b-issued"]};
  return "<span class='badge " + m[st][1] + "'>" + m[st][0] + "</span>";
}

function itemBadge(st) {
  if (st === "⚙️ В роботі") return "b-work";
  if (st === "✅ Готово") return "b-ready";
  if (st === "📦 Виданий") return "b-issued";
  if (st === "⏳ Відкладено") return "b-postponed";
  return "b-new";
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() { renderStats(); renderOrders(); renderClients(); renderAnalytics(); renderManagerFilters(); }

function renderStats() {
  const active = ORDERS.filter(o => getStatus(gv(o,"Номер замовлення")) !== "issued").length;
  const inWork = ITEMS.filter(i => gv(i,"Статус") === "⚙️ В роботі").length;
  const ready = ITEMS.filter(i => gv(i,"Статус") === "✅ Готово").length;
  const issued = ORDERS.filter(o => getStatus(gv(o,"Номер замовлення")) === "issued").length;
  document.getElementById("stats-row").innerHTML =
    "<div class='stat-card'><div class='stat-label'>Активних замовлень</div><div class='stat-val stat-accent'>" + active + "</div></div>" +
    "<div class='stat-card'><div class='stat-label'>Виробів в роботі</div><div class='stat-val'>" + inWork + "</div></div>" +
    "<div class='stat-card'><div class='stat-label'>Готові до видачі</div><div class='stat-val' style='color:#3B6D11'>" + ready + "</div></div>" +
    "<div class='stat-card'><div class='stat-label'>Видано замовлень</div><div class='stat-val' style='color:var(--muted)'>" + issued + "</div></div>";
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll("#status-filters .fbtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderOrders();
}

function setManager(m, btn) {
  currentManager = m;
  document.querySelectorAll("#manager-filters .fbtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderOrders();
}

function renderManagerFilters() {
  const el = document.getElementById("manager-filters");

  el.innerHTML = managers.map(m =>
    "<button class='fbtn" + (m === currentManager ? " active" : "") + "' onclick=\"setManager('" + m + "',this)\">" + (m === "all" ? "Всі" : m) + "</button>"

function renderOrders() {
  const q = (document.getElementById("search-input")?.value || "").toLowerCase();
  const filtered = ORDERS.filter(o => {
    const num = gv(o,"Номер замовлення");
    const st = getStatus(num);
    const mf = currentFilter === "all" || st === currentFilter;
    const mm = currentManager === "all" || gv(o,"Приймальник") === currentManager;
    const mq = !q || gv(o,"Ім'я клієнта").toLowerCase().includes(q) || num.toLowerCase().includes(q) || gv(o,"Телефон").includes(q);
    return mf && mm && mq;
  });
  const el = document.getElementById("orders-body");
  if (!filtered.length) {
    el.innerHTML = "<div style='padding:28px;text-align:center;color:var(--muted);font-size:13px'>Замовлень не знайдено</div>";
    return;
  }
  el.innerHTML = filtered.map(o => {
    const num = gv(o,"Номер замовлення");
    const urgent = gv(o,"Термін") === "Терміново" || gv(o,"Термін") === "⚡ Терміново";
    return "<div class='order-row' onclick=\"openOrder('" + num + "')\">" +
      "<div class='cell'><span class='onum'>" + num + "</span></div>" +
      "<div class='cell' style='flex-direction:column;align-items:flex-start;gap:2px'><span style='font-weight:500'>" + gv(o,"Ім'я клієнта") + "</span><span style='font-size:11px;color:var(--muted)'>" + gv(o,"Телефон") + "</span></div>" +

      "<div class='cell' style='color:var(--muted)'>" + gv(o,"Приймальник") + "</div>" +

function openOrder(num) {
  const order = ORDERS.find(o => gv(o,"Номер замовлення") === num);
  if (!order) return;
  const items = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  document.getElementById("modal-title").textContent = "Замовлення " + num;
  let itemsHTML = "";
  items.forEach(item => {
    const iNum = gv(item,"Номер виробу");
    const iSt = gv(item,"Статус");
    const iAccept = gv(item,"Дата прийому");
    const iWork = gv(item,"Дата в роботі");
    const iReady = gv(item,"Дата готово");
    const iIssued = gv(item,"Дата видачі");
    itemsHTML += "<div class='icard'>" +
      "<div class='icard-head'><span class='inum-badge'>" + iNum + "</span><span class='badge " + itemBadge(iSt) + "'>" + iSt + "</span></div>" +
      "<div class='itype'>" + gv(item,"Тип") + " — " + gv(item,"Бренд") + "</div>" +
      "<div class='isvcs'>" + gv(item,"Послуги") + "</div>" +
      "<div class='ifooter'><div class='idates'>" +
      (iAccept ? "Прийнято: " + iAccept : "") +
      (iWork ? "<br>В роботі: " + iWork : "") +
      (iReady ? "<br>Готово: " + iReady : "") +
      (iIssued ? "<br>Видано: " + iIssued : "") +
      "</div><div class='iprice'>" + gv(item,"Сума") + "</div></div></div>";

  document.getElementById("modal-footer").innerHTML =
    "<button class='btn' onclick=\"printOrder('" + num + "')\">Роздрукувати</button>" +
    "<button class='btn btn-primary' onclick='closeModal()'>Закрити</button>";
  document.getElementById("modal-bg").classList.add("open");
}

function printPlan() {
  const q = (document.getElementById("search-input")?.value || "").toLowerCase();

        items.map(i => "<div class='irow'><div class='inum'>" + gv(i,"Номер виробу") + "</div><div class='iname'>" + gv(i,"Тип") + " — " + gv(i,"Бренд") + "</div><div class='isvcs'>" + gv(i,"Послуги") + "</div></div>").join("") + "</div>";

}

function renderClients() {
  const q = (document.getElementById("client-search")?.value || "").toLowerCase();
  const map = {};
  ORDERS.forEach(o => {
    const k = gv(o,"Телефон");
    if (!map[k]) map[k] = {name: gv(o,"Ім'я клієнта"), phone: k, orders: [], total: 0};
    const num = gv(o,"Номер замовлення");
    map[k].orders.push(num);
    ITEMS.filter(i => gv(i,"Номер замовлення") === num).forEach(i => { map[k].total += extractAmt(gv(i,"Сума")); });
  });
  const clients = Object.values(map).filter(c => !q || c.name.toLowerCase().includes(q) || c.phone.includes(q));
  document.getElementById("clients-grid").innerHTML = clients.map(c => {
    const initials = c.name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
    return "<div class='ccard'><div class='cavatar'>" + initials + "</div><div class='cname'>" + c.name + "</div><div class='cphone'>" + c.phone + "</div><div class='cmeta'>Замовлень: " + c.orders.length + " · " + c.total.toLocaleString("uk-UA") + " ₴</div></div>";
  }).join("");
}

function renderAnalytics() {
  const issued = ORDERS.filter(o => getStatus(gv(o,"Номер замовлення")) === "issued");
  const issuedItems = ITEMS.filter(i => gv(i,"Статус") === "📦 Виданий");
  const total = issuedItems.reduce((s,i) => s + extractAmt(gv(i,"Сума")), 0);
  const avg = issued.length ? Math.round(total / issued.length) : 0;
  const clients = new Set(ORDERS.map(o => gv(o,"Телефон"))).size;
  document.getElementById("analytics-stats").innerHTML =
    "<div class='stat-card'><div class='stat-label'>Загальний обіг</div><div class='stat-val stat-accent'>" + total.toLocaleString("uk-UA") + " ₴</div></div>" +
    "<div class='stat-card'><div class='stat-label'>Середній чек</div><div class='stat-val'>" + avg.toLocaleString("uk-UA") + " ₴</div></div>" +
    "<div class='stat-card'><div class='stat-label'>Клієнтів</div><div class='stat-val'>" + clients + "</div></div>" +
    "<div class='stat-card'><div class='stat-label'>Виданих замовлень</div><div class='stat-val' style='color:var(--muted)'>" + issued.length + "</div></div>";
  document.getElementById("revenue-block").innerHTML =
    "<div class='rev-big'>" + total.toLocaleString("uk-UA") + " ₴</div>" +
    "<div class='rev-sub'>Підтверджений обіг</div>" +
    "<div class='rev-grid'><div class='rev-cell'><div class='rev-cell-label'>Виданих</div><div class='rev-cell-val'>" + issued.length + "</div></div>" +
    "<div class='rev-cell'><div class='rev-cell-label'>Середній чек</div><div class='rev-cell-val'>" + avg.toLocaleString("uk-UA") + " ₴</div></div>" +
    "<div class='rev-cell'><div class='rev-cell-label'>Виробів</div><div class='rev-cell-val'>" + issuedItems.length + "</div></div></div>";
  const svcCount = {};
  ITEMS.forEach(i => {
    (gv(i,"Послуги") || "").split(",").forEach(s => {
      const k = s.trim().split("—")[0].trim().slice(0,22);
      if (k) svcCount[k] = (svcCount[k] || 0) + 1;
    });
  });
  const top = Object.entries(svcCount).sort((a,b) => b[1]-a[1]).slice(0,6);
  const maxS = top[0] ? top[0][1] : 1;
  const mgrMap = {};
  ORDERS.forEach(o => {
    const m = gv(o,"Приймальник") || "—";
    if (!mgrMap[m]) mgrMap[m] = 0;
    mgrMap[m]++;
  });
  const mgrs = Object.entries(mgrMap).sort((a,b) => b[1]-a[1]);
  const maxM = mgrs[0] ? mgrs[0][1] : 1;
  document.getElementById("analytics-grid").innerHTML =
    "<div class='chart-card'><div class='chart-title'>Топ послуг</div>" +
    top.map(([n,c]) => "<div class='bar-row'><div class='bar-label'>" + n + "</div><div class='bar-track'><div class='bar-fill' style='width:" + Math.round(c/maxS*100) + "%'></div></div><div class='bar-val'>" + c + " шт.</div></div>").join("") +
    "</div><div class='chart-card'><div class='chart-title'>По приймальниках</div>" +
    mgrs.map(([n,c]) => "<div class='bar-row'><div class='bar-label'>" + n + "</div><div class='bar-track'><div class='bar-fill' style='width:" + Math.round(c/maxM*100) + "%'></div></div><div class='bar-val'>" + c + " зам.</div></div>").join("") +
    "</div>";
}

function showPage(name, tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  tab.classList.add("active");
}

    hardware: [["Заміна карабіна (без матеріалу)",250],["Заміна пряжки ременя (без матеріалу)",250],["Заміна кнопки / заклепки / люверса",200],["Заміна магніта (без матеріалу)",500],["Встановлення декоративної латки",900],["Встановлення внутрішньої латки",450],["Встановлення кільця (без матеріалу)",250]],
    sewing: [["Відновлення машинного шва сумки",300],["Підклейка шкіри / деталі",300],["Ремонт кріплення ручок (без заміни деталей)",450],["Виготовлення шкіряного пулера",500],["Виготовлення та заміна тренчика",500],["Виготовлення та перешивка деталей",900],["Заміна канта в гаманці / клатчі",1200],["Заміна окантовки — кедер",1200]],
    lining: [["Заміна підкладки — сумка S",1800],["Заміна підкладки — сумка M",2200],["Заміна підкладки — сумка L",2600],["Заміна підкладки — гаманець / органайзер",2600]],
    edges: [["Торцювання урізу шкіри",12],["Торцювання ручок (2 сторони)",1200],["Торцювання ручок (4 сторони)",1400],["Торцювання плечового ременя",1400],["Торцювання тренчика / пулера",400]],
    belt: [["Пробивання отворів",200],["Вкорочення шкіряного поясного ременя",450],["Вкорочення ременя з перешиванням пряжки",600],["Заміна підкладки поясного ременя",2000],["Реставрація поясного ременя",800]]
  }
};

const DEPT_LABELS = {
  shoes: {cleaning:"Чистка / Базовий догляд",painting:"Фарбування / Реставрація",heels:"Каблуки та набійки",sole:"Підошва",zippers:"Блискавки",hardware:"Фурнітура",sewing:"Швейні роботи та деталі",stretch:"Розтяжка"},
  bags: {cleaning:"Чистка / Базовий догляд",painting:"Фарбування / Реставрація",handles:"Ручки та ремінь",zippers:"Блискавки",hardware:"Фурнітура",sewing:"Швейні роботи та деталі",lining:"Підкладка",edges:"Реставрація урізів",belt:"Поясний ремінь"}
};

let NO = {manager:"",client:"",phone:"",items:[],payment:"",deadline:""};
let curItem = -1;

function openNewOrder() {
  NO = {manager:"",client:"",phone:"",items:[],payment:"",deadline:""};
  document.getElementById("modal-title").textContent = "Нове замовлення";
  showStep1();
  document.getElementById("modal-bg").classList.add("open");
}

function showStep1() {
  const body = document.getElementById("modal-body");
  body.innerHTML = "";
  // Manager
  const mg = document.createElement("div");
  mg.className = "form-group";
  const ml = document.createElement("div");
  ml.className = "form-label";
  ml.textContent = "Хто приймає";
  const mb = document.createElement("div");
  mb.className = "btn-group";
  mb.id = "mgr-btns";
  PARTNERS.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "fbtn" + (NO.manager === p ? " active" : "");
    btn.textContent = p;
    btn.onclick = () => { NO.manager = p; mb.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); };
    mb.appendChild(btn);
  });
  mg.appendChild(ml); mg.appendChild(mb); body.appendChild(mg);
  // Client
  const cg = document.createElement("div");
  cg.className = "form-group";
  cg.innerHTML = "<div class='form-label'>Ім'я клієнта</div><input class='form-input' id='no-client' placeholder=\"Ім'я або назва магазину\" value='" + (NO.client || "") + "'>";
  body.appendChild(cg);
  // Phone
  const pg = document.createElement("div");
  pg.className = "form-group";
  pg.innerHTML = "<div class='form-label'>Номер телефону</div><input class='form-input' id='no-phone' placeholder='+380...' value='" + (NO.phone || "") + "'>";
  body.appendChild(pg);
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='closeModal()'>Скасувати</button><button class='btn btn-primary' onclick='step1Next()'>Далі →</button>";
}

function step1Next() {
  if (!NO.manager) { alert("Оберіть приймальника"); return; }
  NO.client = document.getElementById("no-client").value.trim();
  NO.phone = document.getElementById("no-phone").value.trim();
  if (!NO.client) { alert("Введіть ім'я клієнта"); return; }
  if (!NO.phone) { alert("Введіть номер телефону"); return; }
  showItemsList();
}

function showItemsList() {
  document.getElementById("modal-title").textContent = "Замовлення — " + NO.client;
  const body = document.getElementById("modal-body");
  body.innerHTML = "";
  const sec = document.createElement("div");
  sec.className = "form-group";
  const lbl = document.createElement("div");
  lbl.className = "form-label";
  lbl.textContent = "Вироби";
  sec.appendChild(lbl);
  if (NO.items.length === 0) {
    const empty = document.createElement("div");
    empty.style.cssText = "color:var(--muted);font-size:13px;padding:8px 0";
    empty.textContent = "Ще немає виробів";
    sec.appendChild(empty);
  } else {
    NO.items.forEach((item, i) => {
      const card = document.createElement("div");
      card.className = "item-list-card";
      card.innerHTML = "<div class='item-list-info'><div class='item-list-name'>" + item.typeLabel + " — " + item.brand + "</div><div class='item-list-meta'>" + item.services + " · " + item.total + "</div></div>";
      const rm = document.createElement("button");
      rm.className = "item-list-remove";
      rm.textContent = "×";
      rm.onclick = () => { NO.items.splice(i, 1); showItemsList(); };
      card.appendChild(rm);
      sec.appendChild(card);
    });
  }
  const addBtn = document.createElement("button");
  addBtn.className = "btn";
  addBtn.style.cssText = "width:100%;margin-top:8px";
  addBtn.textContent = "+ Ще один виріб";
  addBtn.onclick = addItem;
  sec.appendChild(addBtn);
  body.appendChild(sec);
  if (NO.items.length > 0) {
    document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='showStep1()'>← Назад</button><button class='btn' onclick='addItem()'>+ Ще один виріб</button><button class='btn btn-primary' onclick='showStep3()'>Далі →</button>";
  } else {
    document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='showStep1()'>← Назад</button><button class='btn btn-primary' onclick='addItem()'>Додати виріб</button>";
  }
}

function addItem() {
  curItem = NO.items.length;
  NO.items.push({type:"",typeLabel:"",brand:"",dept:"",services:"",total:"",price:0,extra200:false});
  showSelectType();
}

function showSelectType() {
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>Тип виробу</div><div class='btn-group' id='type-btns'></div></div>";
  const btns = document.getElementById("type-btns");
  [["shoes","👟 Взуття"],["bags","👜 Сумка / Аксесуар"]].forEach(([type, label]) => {
    const btn = document.createElement("button");
    btn.className = "fbtn" + (NO.items[curItem].type === type ? " active" : "");
    btn.style.cssText = "flex:1;padding:14px;font-size:14px";
    btn.textContent = label;
    btn.onclick = () => { NO.items[curItem].type = type; NO.items[curItem].typeLabel = label.replace("👟 ","").replace("👜 ",""); btns.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); };
    btns.appendChild(btn);
  });
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='showItemsList()'>← Назад</button><button class='btn btn-primary' onclick='goToBrand()'>Далі →</button>";
}

function goToBrand() {
  if (!NO.items[curItem].type) { alert("Оберіть тип виробу"); return; }
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>Бренд та модель</div><input class='form-input' id='no-brand' placeholder=\"Gucci, LV, без бренду...\" value='" + (NO.items[curItem].brand || "") + "'></div>";
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='showSelectType()'>← Назад</button><button class='btn btn-primary' onclick='goToDept()'>Далі →</button>";
  document.getElementById("no-brand").focus();
}

function goToDept() {
  const brand = document.getElementById("no-brand").value.trim();
  if (!brand) { alert("Введіть бренд або «без бренду»"); return; }
  NO.items[curItem].brand = brand;
  const type = NO.items[curItem].type;
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>" + NO.items[curItem].typeLabel + " — " + brand + " · Відділ</div><div id='dept-list'></div></div>";
  const list = document.getElementById("dept-list");
  Object.entries(DEPT_LABELS[type]).forEach(([id, label]) => {
    const btn = document.createElement("button");
    btn.className = "fbtn" + (NO.items[curItem].dept === id ? " active" : "");
    btn.style.cssText = "width:100%;text-align:left;margin-bottom:6px;padding:10px 14px";
    btn.textContent = label;
    btn.onclick = () => { NO.items[curItem].dept = id; list.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); };
    list.appendChild(btn);
  });
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='goToBrand()'>← Назад</button><button class='btn btn-primary' onclick='goToService()'>Далі →</button>";
}

function goToService() {
  if (!NO.items[curItem].dept) { alert("Оберіть відділ"); return; }
  const type = NO.items[curItem].type;
  const dept = NO.items[curItem].dept;
  const svcs = SERVICES[type][dept];
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>Послуга</div><div id='svc-list' style='max-height:300px;overflow-y:auto'></div></div>";
  const list = document.getElementById("svc-list");
  svcs.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "svc-btn" + (NO.items[curItem].services === s[0] ? " active" : "");
    btn.innerHTML = "<span>" + s[0] + "</span><span class='svc-price'>" + s[1].toLocaleString("uk-UA") + " ₴</span>";
    btn.onclick = () => { NO.items[curItem].services = s[0]; NO.items[curItem].price = s[1]; list.querySelectorAll(".svc-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); };
    list.appendChild(btn);
  });
  const manBtn = document.createElement("button");
  manBtn.className = "svc-btn";
  manBtn.style.color = "var(--umbra)";
  manBtn.innerHTML = "<span>✏️ Ввести вручну</span>";
  manBtn.onclick = showManualSvc;
  list.appendChild(manBtn);
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='goToDept()'>← Назад</button><button class='btn btn-primary' onclick='goToQty()'>Далі →</button>";
}

function showManualSvc() {
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>Назва послуги</div><input class='form-input' id='man-name' placeholder='Введіть назву...'></div><div class='form-group'><div class='form-label'>Ціна (₴)</div><input class='form-input' type='number' id='man-price' placeholder='500'></div>";
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='goToService()'>← Назад</button><button class='btn btn-primary' onclick='confirmManual()'>Далі →</button>";
}

function confirmManual() {
  const name = document.getElementById("man-name").value.trim();
  const price = parseInt(document.getElementById("man-price").value || "0");
  if (!name || !price) { alert("Заповніть всі поля"); return; }
  NO.items[curItem].services = "📝 " + name;
  NO.items[curItem].price = price;
  NO.items[curItem].total = price.toLocaleString("uk-UA") + " ₴";
  NO.items.pop();
  NO.items.push(NO.items[curItem]);
  showItemsList();
}

function goToQty() {
  if (!NO.items[curItem].services) { alert("Оберіть послугу"); return; }
  const dept = NO.items[curItem].dept;
  const showExtra = dept === "cleaning" || dept === "painting";
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>Кількість</div><div class='btn-group' id='qty-btns'></div></div><div class='form-group'><div class='form-label'>Вартість (₴)</div><input class='form-input' type='number' id='no-price' placeholder='1400'></div>" +
    (showExtra ? "<div class='form-group'><div class='form-label'>Додатковий колір або матеріал?</div><div class='btn-group' id='extra-btns'><button class='fbtn' id='extra-yes' onclick='setExtra(true)'>Так — +200 ₴</button><button class='fbtn active' id='extra-no' onclick='setExtra(false)'>Ні</button></div></div>" : "");
  const qtyBtns = document.getElementById("qty-btns");
  [1,2,3,"Інше"].forEach(n => {
    const btn = document.createElement("button");
    btn.className = "fbtn";
    btn.style.cssText = "flex:1;padding:10px;font-size:" + (typeof n === "number" ? "16px" : "13px");
    btn.textContent = n;
    btn.onclick = () => { qtyBtns.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); if (typeof n === "number") { const p = NO.items[curItem].price; document.getElementById("no-price").value = p * n; } };
    qtyBtns.appendChild(btn);
  });
  // Auto-fill price
  document.getElementById("no-price").value = NO.items[curItem].price || "";
  NO.items[curItem].extra200 = false;
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='goToService()'>← Назад</button><button class='btn btn-primary' onclick='confirmItem()'>Додати виріб</button>";
}

function setExtra(yes) {
  NO.items[curItem].extra200 = yes;
  document.getElementById("extra-yes").classList.toggle("active", yes);
  document.getElementById("extra-no").classList.toggle("active", !yes);
}

function confirmItem() {
  const priceVal = parseInt(document.getElementById("no-price").value || "0");
  if (!priceVal) { alert("Введіть вартість"); return; }
  const extra = NO.items[curItem].extra200 ? 200 : 0;
  const total = priceVal + extra;
  NO.items[curItem].total = total.toLocaleString("uk-UA") + " ₴";
  showItemsList();
}

function showStep3() {
  const body = document.getElementById("modal-body");
  body.innerHTML = "<div class='form-group'><div class='form-label'>Тип оплати</div><div class='btn-group' id='pay-btns'><button class='fbtn' style='flex:1;padding:10px' onclick='selectPay(\"Передоплата\",this)'>💳 Передоплата</button><button class='fbtn' style='flex:1;padding:10px' onclick='selectPay(\"Після­оплата\",this)'>📦 Після­оплата</button></div></div><div id='prepay-wrap' style='display:none' class='form-group'><div class='form-label'>Сума передоплати</div><input class='form-input' type='number' id='prepay-amt' placeholder='500'></div><div class='form-group'><div class='form-label'>Термін виконання</div><div class='btn-group' id='deadline-btns'><button class='fbtn' onclick='selectDeadline(\"⚡ Терміново\",this)'>⚡ Терміново</button><button class='fbtn' onclick='selectDeadline(\"Без терміну\",this)'>🕐 Без терміну</button><button class='fbtn' onclick='selectDeadline(\"date\",this)'>📅 Вказати дату</button></div><input class='form-input' id='deadline-date' placeholder='10.06 або п'\''ятниця' style='display:none;margin-top:8px'></div>";
  document.getElementById("modal-footer").innerHTML = "<button class='btn' onclick='showItemsList()'>← Назад</button><button class='btn btn-primary' onclick='submitOrder()'>Оформити замовлення</button>";
}

function selectPay(type, btn) {
  NO.payment = type;
  document.querySelectorAll("#pay-btns .fbtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("prepay-wrap").style.display = type === "Передоплата" ? "block" : "none";
}

function selectDeadline(val, btn) {
  document.querySelectorAll("#deadline-btns .fbtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const di = document.getElementById("deadline-date");
  if (val === "date") { di.style.display = "block"; NO.deadline = ""; }
  else { di.style.display = "none"; NO.deadline = val; }
}

async function submitOrder() {
  if (!NO.payment) { alert("Оберіть тип оплати"); return; }
  if (!NO.deadline) {
    const dv = document.getElementById("deadline-date")?.value.trim();
    if (!dv) { alert("Вкажіть термін виконання"); return; }
    NO.deadline = dv;
  }
  if (NO.payment === "Передоплата") {
    const amt = document.getElementById("prepay-amt")?.value;
    if (amt) NO.payment = "Передоплата: " + parseInt(amt).toLocaleString("uk-UA") + " ₴";
  }
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const dateStr = pad(now.getDate()) + "." + pad(now.getMonth()+1) + "." + now.getFullYear() + " " + pad(now.getHours()) + ":" + pad(now.getMinutes());
  const payload = {
    date: dateStr,
    manager: NO.manager,
    client: NO.client,
    phone: NO.phone,
    payment: NO.payment,
    deadline: NO.deadline,
    items: NO.items.map((item, i) => ({
      type: item.typeLabel,
      brand: item.brand,
      services: item.services,
      total: item.total
    }))
  };
  document.getElementById("modal-body").innerHTML = "<div style='text-align:center;padding:32px;color:var(--muted);font-size:13px'>⏳ Збереження...</div>";
  document.getElementById("modal-footer").innerHTML = "";
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      mode: "cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (result.status === "ok") {
      document.getElementById("modal-body").innerHTML = "<div style='text-align:center;padding:32px;color:#3B6D11;font-size:15px'>✅ Замовлення " + result.order_num + " збережено!</div>";
      setTimeout(() => { closeModal(); setTimeout(loadData, 1000); }, 2000);
    } else {
      document.getElementById("modal-body").innerHTML = "<div style='text-align:center;padding:32px;color:#a33030;font-size:13px'>Помилка: " + result.message + "</div>";
    }
  } catch(e) {
    document.getElementById("modal-body").innerHTML = "<div style='text-align:center;padding:32px;color:#a33030;font-size:13px'>Помилка збереження: " + e.message + "</div>";
  }
}
</script>
