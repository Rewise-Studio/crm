/* ═══════════════ УСПІШНІСТЬ (вчасно / із запізненням) ═══════════════ */
function punctualityPanel(orders) {
  // Замовлення: порівнюємо дату видачі виробу з терміном замовлення
  let onTime = 0, late = 0, noData = 0;
  orders.forEach(o => {
    const term = parseDeadline(gv(o,"Термін"));
    const its = ITEMS.filter(i => gv(i,"Номер замовлення") === gv(o,"Номер замовлення"));
    const issuedDates = its.map(it => parseDeadline(gv(it,"Дата видачі"))).filter(Boolean);
    if (!term || !issuedDates.length || issuedDates.length !== its.length) { noData++; return; }
    const lastIssued = new Date(Math.max.apply(null, issuedDates));
    if (lastIssued <= term) onTime++; else late++;
  });

  // Задачі: дата виконання проти дедлайну
  let tOnTime = 0, tLate = 0;
  TASKS.forEach(t => {
    const dl = parseDeadline(t["Дедлайн"]);
    if (!dl) return;
    if (t["Статус"] === "так") {
      const doneD = parseDeadline(t["Виконано"]);
      if (doneD) { if (doneD <= dl) tOnTime++; else tLate++; }
      else tOnTime++;
    } else {
      const now = new Date(); now.setHours(0,0,0,0);
      if (dl < now) tLate++;
    }
  });

  const totalMeasured = onTime + late;
  const pct = totalMeasured ? Math.round(onTime / totalMeasured * 100) : null;
  const tTotal = tOnTime + tLate;
  const tPct = tTotal ? Math.round(tOnTime / tTotal * 100) : null;

  function metric(label, value, sub, accent) {
    return "<div class='pay-split-item'><div class='ps-label'>" + label + "</div>" +
      "<div class='ps-value'" + (accent ? " style='color:" + accent + "'" : "") + ">" + value + "</div>" +
      (sub ? "<div style='font-size:11px;color:var(--txt-3);margin-top:4px'>" + sub + "</div>" : "") + "</div>";
  }

  const pctColor = pct === null ? "" : (pct >= 85 ? "#2FA98C" : pct >= 60 ? "#EF9F27" : "var(--st-postponed-fg)");
  const tPctColor = tPct === null ? "" : (tPct >= 85 ? "#2FA98C" : tPct >= 60 ? "#EF9F27" : "var(--st-postponed-fg)");

  return "<div class='stat-panel'><div class='stat-panel-label'>Успішність — чи вкладаємось у терміни</div>" +
    "<div class='pay-split'>" +
      metric("Замовлення вчасно", pct === null ? "—" : pct + "%", onTime + " з " + totalMeasured + " виданих", pctColor) +
      metric("Із запізненням", late, totalMeasured ? Math.round(late/totalMeasured*100) + "% виданих" : "", late ? "var(--st-postponed-fg)" : "") +
      metric("Задачі вчасно", tPct === null ? "—" : tPct + "%", tTotal ? tOnTime + " з " + tTotal : "немає дедлайнів", tPctColor) +
      metric("Без даних", noData, "немає терміну або не видано", "") +
    "</div></div>";
}

      if (!d) return;
      const num = gv(o,"Номер замовлення");
      const st = getStatus(num);
      const done = st === "issued";
      const now = new Date(); now.setHours(0,0,0,0);
      events.push({
        type: "order", date: d, done: done,
        late: !done && d < now,
        title: num.replace("RW-","#") + " " + (gv(o,"Ім'я клієнта") || ""),
        sub: orderServices(num),
        ref: num
      });
    });
  }
  if (calFilter !== "orders") {
    TASKS.forEach(t => {
      const d = parseDeadline(t["Дедлайн"]);
      if (!d) return;
      const done = t["Статус"] === "так";
      const now = new Date(); now.setHours(0,0,0,0);
      events.push({
        type: "task", date: d, done: done,
        late: !done && d < now,
        title: t["Текст"],
        sub: t["Замовлення"] ? t["Замовлення"].replace("RW-","#") : "",
        ref: t["Замовлення"] || ""
      });
    });
  }
  return events;
}

renderers.calendar = function() {
  const page = document.getElementById("page-calendar");
  const events = calendarEvents();
  const today = new Date(); today.setHours(0,0,0,0);

  // Перший день сітки (понеділок тижня, в якому 1-е число)
  const first = new Date(calYear, calMonth, 1);
  let startOffset = (first.getDay() + 6) % 7; // Пн = 0
  const gridStart = new Date(calYear, calMonth, 1 - startOffset);

  let cells = "";
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
    const inMonth = d.getMonth() === calMonth;
    const isToday = sameDay(d, today);
    const dayEvents = events.filter(e => sameDay(e.date, d));
    const evHTML = dayEvents.slice(0, 3).map(e =>
      "<div class='cal-ev " + (e.late ? "late" : e.type) + "'>" + (e.done ? "✓ " : "") + e.title + "</div>"
    ).join("");
    const more = dayEvents.length > 3 ? "<div class='cal-more'>+" + (dayEvents.length - 3) + " ще</div>" : "";
    cells += "<div class='cal-cell" + (inMonth ? "" : " other") + (isToday ? " today" : "") + "' onclick=\"openCalDay('" + d.toISOString().slice(0,10) + "')\">" +
      "<div class='cal-daynum'>" + d.getDate() + "</div>" + evHTML + more + "</div>";
  }

  const dowHTML = DOW_NAMES.map(n => "<div class='cal-dow'>" + n + "</div>").join("");
  const filterBtn = (k, label) =>
    "<button class='mt-btn" + (calFilter===k?" active":"") + "' onclick=\"setCalFilter('" + k + "')\">" + label + "</button>";

  page.innerHTML =
    "<div class='page-header'><div class='page-title'>Календар</div></div>" +
    "<div class='tab-scroll'>" +
      "<div class='cal-head'>" +
        "<button class='cal-nav-btn' onclick='calShift(-1)'>‹</button>" +
        "<span class='cal-month'>" + MONTH_NAMES[calMonth] + " " + calYear + "</span>" +
        "<button class='cal-nav-btn' onclick='calShift(1)'>›</button>" +
        "<button class='cal-today-btn' onclick='calToday()'>Сьогодні</button>" +
        "<div class='cal-filters'>" + filterBtn("all","Все") + filterBtn("orders","Замовлення") + filterBtn("tasks","Задачі") + "</div>" +
      "</div>" +
      "<div class='cal-grid'>" + dowHTML + cells + "</div>" +
    "</div>";
};

function calShift(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderers.calendar();
}
function calToday() {
  const n = new Date();
  calMonth = n.getMonth(); calYear = n.getFullYear();
  renderers.calendar();
}
function setCalFilter(k) { calFilter = k; renderers.calendar(); }

/* Перегляд конкретного дня — у модалці */
function openCalDay(iso) {
  const d = new Date(iso + "T00:00:00");
  const events = calendarEvents().filter(e => sameDay(e.date, d));
  const body = document.getElementById("odm-body");
  const dateLabel = d.getDate() + " " + MONTH_NAMES[d.getMonth()].toLowerCase() + " " + d.getFullYear();

  const list = events.length ? events.map(e =>

const BONUS_PCT = 3;          // відсоток нарахування від суми чека
const BONUS_MIN_SPEND = 200;  // мінімальний баланс для списання балів

/* Баланс балів клієнта = сума нарахованих - сума списаних по всіх замовленнях телефону */
function clientBonusBalance(phone) {
  let accrued = 0, spent = 0;
  ORDERS.filter(o => gv(o,"Телефон") === phone).forEach(o => {
    accrued += extractAmt(gv(o,"Нараховано бонусів"));
    spent += extractAmt(gv(o,"Списано бонусів"));
  });
  return accrued - spent;
}

const ITEM_STATUSES = [
  ["🆕 Новий", "Прийнято", "#378ADD"],
  ["⚙️ В роботі", "В роботі", "#EF9F27"],
  ["✅ Готово", "Готово", "#639922"],
  ["📦 Виданий", "Видано", "#639922"]
];
function itemStatusIndex(status) {
  if (status === "📦 Виданий") return 3;
  if (status === "✅ Готово") return 2;
  if (status === "⚙️ В роботі") return 1;
  return 0;
}

/* Звальний відмінок (кличний) — мʼяке відмінювання */
function vocative(name) {
  if (!name) return "";
  const parts = name.trim().split(/\s+/);
  const first = parts[0];
  const lc = first.toLowerCase();
  // жіночі на -а/-я
  if (/[бвгґджзклмнпрстфхцчшщ]а$/i.test(first)) return first.slice(0,-1) + "о";
  if (/ія$/i.test(first)) return first.slice(0,-1) + "є";
  if (/[зждлр]я$/i.test(first)) return first.slice(0,-1) + "е";
  // чоловічі на приголосний
  if (/[бвгґджзклмнпрстфхцчшщ]$/i.test(first)) {
    if (/[гґкх]$/i.test(first)) return first + "у";
    return first + "е";
  }
  if (/й$/i.test(first)) return first.slice(0,-1) + "ю";
  if (/о$/i.test(first)) return first;
  return first;
}

/* Рейтинг клієнта за середньою затримкою видачі */
const RATING_META = {
  green:  { dot: "🟢", label: "Надійний" },
  yellow: { dot: "🟡", label: "Звичайний" },
  red:    { dot: "🔴", label: "Уважно" }
};

/* Ручне перевизначення рейтингу (остання непорожня позначка по телефону) */
function manualRating(phone) {
  const orders = ORDERS.filter(o => gv(o,"Телефон") === phone);
  for (let i = orders.length - 1; i >= 0; i--) {
    const v = gv(orders[i], "Рейтинг вручну");
    if (v) return v;
  }
  return "";
}

function clientRating(phone) {
  const manual = manualRating(phone);
  if (manual && RATING_META[manual]) {
    return Object.assign({}, RATING_META[manual], { manual: true });
  }
  const orders = ORDERS.filter(o => gv(o,"Телефон") === phone);
  let delays = [], hasIssue = false;
  orders.forEach(o => {
    const its = ITEMS.filter(i => gv(i,"Номер замовлення") === gv(o,"Номер замовлення"));
    its.forEach(it => {
      const ready = parseDeadline(gv(it,"Дата готово"));
      const issued = parseDeadline(gv(it,"Дата видачі"));
      if (ready && issued) { const d = (issued - ready)/86400000; delays.push(d); if (d > 7) hasIssue = true; }
    });
  });
  if (!delays.length) return { dot: "🟡", label: "Звичайний" };
  const avg = delays.reduce((a,b)=>a+b,0)/delays.length;
  if (avg <= 2) return { dot: "🟢", label: "Надійний" };
  if (avg > 7 || hasIssue) return { dot: "🔴", label: "Уважно" };
  return { dot: "🟡", label: "Звичайний" };
}

/* Зміна статусу виробу (запис через API) */
async function setItemStatus(num, itemIdx, statusIdx) {
  const its = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  const it = its[itemIdx];
  if (!it) return;
  const newStatus = ITEM_STATUSES[statusIdx][0];
  it["Статус"] = newStatus; // оптимістично оновлюємо локально
  openOrder(num); // перемалювати одразу
  const itemNum = gv(it,"Номер виробу") || (num + "-" + (itemIdx+1));
  try {
    await fetch(API_URL.replace("/order","/status"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ item_num: itemNum, status: newStatus })
    });
  } catch(e) { console.error("status update failed", e); }
}

async function toggleNotified(itemNum, itemIdx, ev) {
  if (ev) ev.stopPropagation();
  const it = ITEMS.find(i => gv(i,"Номер виробу") === itemNum);
  if (!it) return;
  const currently = !!gv(it,"Сповіщено");
  const nowVal = currently ? "" : new Date().toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit"}) + " " + new Date().toLocaleTimeString("uk-UA",{hour:"2-digit",minute:"2-digit"});
  it["Сповіщено"] = nowVal;
  if (detailOrderNum) openOrder(detailOrderNum);
  try {
    await fetch(API_URL.replace("/order","/notify"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ item_num: itemNum, notified: !currently })
    });
  } catch(e) { console.error("notify mark failed", e); }
}

async function markAllNotified(num, notified) {
  const its = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  const nowVal = notified ? new Date().toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit"}) + " " + new Date().toLocaleTimeString("uk-UA",{hour:"2-digit",minute:"2-digit"}) : "";
  its.forEach(it => it["Сповіщено"] = nowVal);
  if (detailOrderNum) openOrder(detailOrderNum);
  for (const it of its) {
    const itemNum = gv(it,"Номер виробу");
    try {
      await fetch(API_URL.replace("/order","/notify"), {
        method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ item_num: itemNum, notified: notified })
      });
    } catch(e) { console.error("notify-all failed for", itemNum, e); }
  }
}
function openSettle(num, toPay) {
  settleState = { num: num, amount: toPay, method: "" };
  const body = document.getElementById("odm-body");
  const wrap = document.createElement("div");
  wrap.className = "settle-overlay";
  wrap.innerHTML =
    "<div class='settle-card'>" +
      "<div class='dblock-label'>Прийняти доплату</div>" +
      "<input class='cr-input' id='settle-amt' type='number' value='" + toPay + "'>" +
      "<div class='settle-methods'>" +
        "<button class='cr-pill' onclick=\"setSettleMethod('Готівка',this)\">Готівка</button>" +
        "<button class='cr-pill' onclick=\"setSettleMethod('Картка',this)\">Картка</button>" +
        "<button class='cr-pill' onclick=\"setSettleMethod('ФОП',this)\">ФОП</button>" +
      "</div>" +
      "<div style='display:flex;gap:8px;margin-top:6px'>" +
        "<button class='cr-btn' onclick='closeSettle()' style='flex:1;background:none;border:1px solid var(--field-border);border-radius:8px;color:var(--txt-2);padding:11px;cursor:pointer;font-family:Commissioner,sans-serif;font-size:12px'>Скасувати</button>" +
        "<button class='d-settle-btn' style='flex:2;margin-top:0' onclick='confirmSettle()'>Підтвердити</button>" +
      "</div>" +
    "</div>";
  body.appendChild(wrap);
}
function setSettleMethod(m, btn) {
  settleState.method = m;
  btn.parentElement.querySelectorAll(".cr-pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
function closeSettle() {
  const ov = document.querySelector(".settle-overlay");
  if (ov) ov.remove();
}
async function confirmSettle() {
  const amt = parseInt(document.getElementById("settle-amt").value || "0");
  if (!amt) { alert("Вкажіть суму"); return; }
  if (!settleState.method) { alert("Оберіть спосіб оплати"); return; }
  const o = ORDERS.find(x => gv(x,"Номер замовлення") === settleState.num);
  if (o) { o["Сума доплати"] = String(amt); o["Спосіб доплати"] = settleState.method; }
  closeSettle();
  openOrder(settleState.num);
  try {
    await fetch(API_URL.replace("/order","/settle"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ order_num: settleState.num, amount: amt, method: settleState.method })
    });
  } catch(e) { console.error("settle failed", e); }
}

/* ─── РУЧНИЙ РЕЙТИНГ КЛІЄНТА ─── */
function openRatingPick(phone) {

    "<div class='settle-card'>" +

        opt("green","Надійний","🟢") + opt("yellow","Звичайний","🟡") + opt("red","Уважно","🔴") +

    "</div>";

}

async function saveRating(phone, rating) {
  // локально: пишемо в останнє замовлення цього телефону
  const orders = ORDERS.filter(o => gv(o,"Телефон") === phone);
  if (orders.length) orders[orders.length-1]["Рейтинг вручну"] = rating;
  closeSettle();
  if (detailOrderNum) openOrder(detailOrderNum); else if (renderers[currentPage]) renderers[currentPage]();
  try {
    await fetch(API_URL.replace("/order","/client/rating"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ phone: phone, rating: rating })
    });
  } catch(e) { console.error("rating save failed", e); }
}

/* ─── БОНУСИ: нарахування з можливістю змінити суму ─── */
function openAccrueBonus(num, suggested) {
  const body = document.getElementById("odm-body");
  const wrap = document.createElement("div");
  wrap.className = "settle-overlay";
  wrap.innerHTML =
    "<div class='settle-card'>" +
      "<div class='dblock-label'>Нарахувати бонуси</div>" +
      "<div style='font-size:12px;color:var(--txt-2);margin-bottom:10px'>Стандартно " + BONUS_PCT + "% від суми чека. Можна змінити або не нараховувати взагалі.</div>" +
      "<input class='cr-input' id='accrue-amt' type='number' value='" + suggested + "'>" +
      "<div style='display:flex;gap:8px;margin-top:10px'>" +

function confirmAccrue(num) {
  const amt = parseInt(document.getElementById("accrue-amt").value || "0");
  if (!amt) { alert("Вкажіть суму або скасуйте"); return; }
  closeSettle();
  accrueBonus(num, amt);
}

async function accrueBonus(num, amount) {
  const o = ORDERS.find(x => gv(x,"Номер замовлення") === num);
  if (o) o["Нараховано бонусів"] = String(amount);
  openOrder(num);
  try {
    await fetch(API_URL.replace("/order","/bonus"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ order_num: num, accrued: amount })
    });
  } catch(e) { console.error("accrue failed", e); }
}

function openSpendBonus(num, balance, total) {
  // Ліміт списання 30% від суми чека
  const maxByOrder = Math.floor(total * 0.3);
  const maxSpend = Math.min(balance, maxByOrder);
  const body = document.getElementById("odm-body");
  const wrap = document.createElement("div");
  wrap.className = "settle-overlay";
  wrap.innerHTML =
    "<div class='settle-card'>" +
      "<div class='dblock-label'>Списати бали</div>" +
      "<div style='font-size:12px;color:var(--txt-2);margin-bottom:10px'>Доступно: " + balance + " · макс. для цього чека (30%): " + maxByOrder + "</div>" +
      "<input class='cr-input' id='spend-amt' type='number' value='" + maxSpend + "' max='" + maxSpend + "'>" +
      "<div style='display:flex;gap:8px;margin-top:10px'>" +
        "<button onclick='closeSettle()' style='flex:1;background:none;border:1px solid var(--field-border);border-radius:8px;color:var(--txt-2);padding:11px;cursor:pointer;font-family:Commissioner,sans-serif;font-size:12px'>Скасувати</button>" +
        "<button class='d-settle-btn' style='flex:2;margin-top:0' onclick=\"confirmSpendBonus('" + num + "'," + maxSpend + ")\">Списати</button>" +
      "</div>" +
    "</div>";
  body.appendChild(wrap);
}
async function confirmSpendBonus(num, maxSpend) {
  let amt = parseInt(document.getElementById("spend-amt").value || "0");
  if (!amt) { alert("Вкажіть суму"); return; }
  if (amt > maxSpend) amt = maxSpend;
  const o = ORDERS.find(x => gv(x,"Номер замовлення") === num);
  if (o) o["Списано бонусів"] = String(amt);
  closeSettle();
  openOrder(num);
  try {
    await fetch(API_URL.replace("/order","/bonus"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ order_num: num, spent: amt })
    });
  } catch(e) { console.error("spend failed", e); }
}
const NOTIFY_TEMPLATES = {
  ready:    (v, num, item) => "Доброго дня, " + v + "! Ваше замовлення " + num + " (" + item + ") готове до видачі. Чекаємо вас у Rewise Studio. Дякуємо, що обрали нас.",
  remind:   (v, num, item) => "Доброго дня, " + v + "! Нагадуємо, що ваше замовлення " + num + " (" + item + ") готове та очікує на видачу в Rewise Studio.",
  accepted: (v, num, item) => "Доброго дня, " + v + "! Ваше замовлення " + num + " (" + item + ") прийнято в роботу. Повідомимо, щойно буде готове. Rewise Studio."
};
function copyNotify(num, type) {
  const o = ORDERS.find(x => gv(x,"Номер замовлення") === num);
  if (!o) return;
  const v = vocative(gv(o,"Ім'я клієнта"));
  const shortNum = num.replace("RW-","№");
  const item = orderItemName(num);
  const text = NOTIFY_TEMPLATES[type](v, shortNum, item);
  copyToClipboard(text);
}
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast("Текст скопійовано")).catch(() => fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); toast("Текст скопійовано"); } catch(e) { alert(text); }
  document.body.removeChild(ta);
}
let toastTimer = null;
function toast(msg) {
  let t = document.getElementById("rw-toast");
  if (!t) { t = document.createElement("div"); t.id = "rw-toast"; document.body.appendChild(t); }
  t.textContent = msg; t.className = "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 2000);
}
