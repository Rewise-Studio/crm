<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rewise CRM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E1E1E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rewise CRM">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Commissioner:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ═══════════════ ТЕМИ — CSS-ЗМІННІ ═══════════════ */
:root {
  /* Бренд (не залежить від теми) */
  --cognac:  #A0845C;
  --cognac-light: rgba(160,132,92,0.12);
  --cognac-border: rgba(160,132,92,0.3);
  --leather: #6B4F3A;
  --brown:   #3A3228;
  --linen:   #F0EBE3;

  /* Статуси */
  --st-new-bg:#E6F1FB; --st-new-fg:#185FA5;
  --st-work-bg:#FAEEDA; --st-work-fg:#854F0B;
  --st-ready-bg:#EAF3DE; --st-ready-fg:#3B6D11;
  --st-issued-bg:#F1EFE8; --st-issued-fg:#5F5E5A;
  --st-postponed-bg:#FCEBEB; --st-postponed-fg:#A32D2D;

  /* Навігація — завжди темна */
  --nav-bg: #181614;
  --nav-border: rgba(160,132,92,0.15);
  --nav-txt: rgba(240,235,227,0.5);
  --nav-txt-active: #fff;
}

/* СВІТЛА тема (за замовчуванням) */
:root, [data-theme="light"] {
  --bg:        #F0EBE3;
  --surface:   #FBF8F3;
  --surface-2: #FFFFFF;
  --txt:       #2A2621;
  --txt-2:     rgba(42,38,33,0.6);
  --txt-3:     rgba(42,38,33,0.4);
  --line:      rgba(58,50,40,0.12);
  --line-soft: rgba(58,50,40,0.08);
  --field-bg:  #FFFFFF;
  --field-border: rgba(58,50,40,0.15);
  --hover:     rgba(160,132,92,0.06);
  --receipt-shadow: 0 8px 28px rgba(58,50,40,0.14);
  --accent-soft: rgba(160,132,92,0.1);
}

/* ТЕМНА тема */
[data-theme="dark"] {
  --bg:        #1E1E1E;
  --surface:   #232020;
  --surface-2: #2a2622;
  --txt:       #F0EBE3;
  --txt-2:     rgba(240,235,227,0.6);
  --txt-3:     rgba(240,235,227,0.4);
  --line:      rgba(160,132,92,0.15);
  --line-soft: rgba(160,132,92,0.08);
  --field-bg:  rgba(240,235,227,0.05);
  --field-border: rgba(160,132,92,0.25);
  --hover:     rgba(160,132,92,0.1);
  --receipt-shadow: 0 8px 28px rgba(0,0,0,0.4);
  --accent-soft: rgba(160,132,92,0.12);
  --st-new-bg:#12324F; --st-new-fg:#9FCBF0;
  --st-work-bg:#3D2E12; --st-work-fg:#F0C066;
  --st-ready-bg:#22381A; --st-ready-fg:#A5D46F;
  --st-issued-bg:#2E2E2A; --st-issued-fg:#B4B2A9;
  --st-postponed-bg:#3D1A1A; --st-postponed-fg:#E88A8A;
}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Commissioner', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  transition: background 0.25s, color 0.25s;
}

/* ═══════════════ НАВІГАЦІЯ ═══════════════ */
.nav {
  width: 84px;
  min-width: 84px;
  background: var(--nav-bg);
  border-right: 1px solid var(--nav-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 0 16px;
  gap: 3px;
  height: 100vh;
  position: sticky;
  top: 0;
  flex-shrink: 0;
  z-index: 20;
}
.nav-logo {
  font-family: 'Tenor Sans', serif;
  font-size: 15px;
  letter-spacing: 0.1em;
  color: var(--linen);
  margin-bottom: 18px;
}
.nav-item {
  width: 68px;
  padding: 10px 0;
  border-radius: 9px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  letter-spacing: 0.02em;
  cursor: pointer;
  color: var(--nav-txt);
  border: none;
  background: transparent;
  font-family: 'Commissioner', sans-serif;
  transition: background 0.15s, color 0.15s;
  text-align: center;
}
.nav-item svg { width: 19px; height: 19px; stroke-width: 1.6; }
.nav-item:hover { color: rgba(240,235,227,0.8); }
.nav-item.active { background: var(--cognac); color: var(--nav-txt-active); }
.nav-spacer { flex: 1; }
.nav-theme {
  width: 44px; height: 44px;
  border-radius: 10px;
  border: 1px solid var(--nav-border);
  background: transparent;
  color: var(--nav-txt);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s, border-color 0.15s;
}
.nav-theme svg { width: 18px; height: 18px; stroke-width: 1.6; }
.nav-theme:hover { color: var(--linen); border-color: var(--cognac-border); }

/* ═══════════════ КОНТЕНТ ═══════════════ */
.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.page { display: none; flex-direction: column; flex: 1; }
.page.active { display: flex; }

.page-header {
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.page-title { font-family: 'Tenor Sans', serif; font-size: 20px; color: var(--txt); }

.btn-primary {
  background: var(--cognac);
  border: none;
  border-radius: 7px;
  color: #fff;
  font-family: 'Commissioner', sans-serif;
  font-size: 12px;
  font-weight: 400;
  padding: 10px 17px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--leather); }
.btn-primary svg { width: 14px; height: 14px; stroke-width: 2; }

/* Заглушка */
.stub {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--txt-3); font-size: 13px; text-align: center;
  padding: 60px 20px; gap: 14px;
}
.stub svg { width: 34px; height: 34px; stroke-width: 1.4; opacity: 0.7; }

/* ═══════════════ ВКЛАДКА СТВОРИТИ (КОШТОРИС) ═══════════════ */
.create-wrap { display: flex; flex: 1; min-height: 0; }
.create-left { width: 66%; padding: 8px 28px 40px; overflow-y: auto; }
.create-right { width: 34%; padding: 8px 26px 40px 4px; }
.create-right-sticky { position: sticky; top: 8px; }

.cr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
.cr-box { background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 16px 18px; }
.cr-box-full { grid-column: 1 / -1; }
.cr-box .cr-block-label { margin-top: 16px; }
.cr-box .cr-block-label.first { margin-top: 0; }

.cr-block-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cognac); margin: 22px 0 12px; }
.cr-block-label.first { margin-top: 8px; }

.cr-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.cr-pill { padding: 9px 15px; border-radius: 20px; border: 1px solid var(--field-border); background: transparent; color: var(--txt-2); font-family: 'Commissioner', sans-serif; font-size: 13px; font-weight: 300; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.cr-pill:hover { border-color: var(--cognac); color: var(--txt); }
.cr-pill.active { background: var(--cognac); color: #fff; border-color: var(--cognac); }
.cr-pill-wide { flex: 1; text-align: center; }

.cr-input { width: 100%; background: var(--field-bg); border: 1px solid var(--field-border); border-radius: 6px; padding: 11px 13px; color: var(--txt); font-family: 'Commissioner', sans-serif; font-size: 14px; font-weight: 300; outline: none; transition: border-color 0.15s; margin-bottom: 9px; }
.cr-input:focus { border-color: var(--cognac); }
.cr-input::placeholder { color: var(--txt-3); }

.cr-client-suggest { position: relative; }.cr-suggest-dd { position: absolute; top: calc(100% - 4px); left: 0; right: 0; background: var(--surface-2); border: 1px solid var(--field-border); border-radius: 6px; max-height: 200px; overflow-y: auto; z-index: 40; display: none; box-shadow: var(--receipt-shadow); }
.cr-suggest-dd.open { display: block; }
.cr-suggest-opt { padding: 10px 13px; font-size: 13px; color: var(--txt); cursor: pointer; border-bottom: 1px solid var(--line-soft); display: flex; justify-content: space-between; }
.cr-suggest-opt:last-child { border-bottom: none; }
.cr-suggest-opt:hover { background: var(--hover); }
.cr-suggest-opt .sug-phone { color: var(--txt-3); font-size: 11px; }

.cr-msg-pick { display: flex; gap: 8px; margin-bottom: 4px; }
.cr-msg-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: 8px;
  border: 1px solid var(--field-border); background: transparent;
  color: var(--txt-2); font-family: 'Commissioner', sans-serif;
  font-size: 12px; font-weight: 300; cursor: pointer;
  transition: all 0.15s;
}
.cr-msg-btn svg { width: 17px; height: 17px; }
.cr-msg-btn .msg-ico { color: var(--txt-3); transition: color 0.15s; }
.cr-msg-btn .msg-ico svg { fill: currentColor; }
.cr-msg-btn:hover { border-color: var(--cognac-border); color: var(--txt); }
.cr-msg-btn.active { border-color: transparent; color: #fff; }

.itemcard { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.itemcard-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.itemcard-num { font-family: 'Tenor Sans', serif; font-size: 11px; color: var(--cognac); letter-spacing: 0.15em; }
.itemcard-rm { background: none; border: none; color: var(--txt-3); cursor: pointer; font-size: 17px; line-height: 1; padding: 0; transition: color 0.15s; }
.itemcard-rm:hover { color: var(--st-postponed-fg); }
.ic-row { display: flex; gap: 8px; margin-bottom: 9px; }
.ic-field { flex: 1; }
.ic-field label { display: block; font-size: 10px; color: var(--txt-3); letter-spacing: 0.08em; margin-bottom: 5px; }
.ic-select, .ic-mini { width: 100%; background: var(--field-bg); border: 1px solid var(--field-border); border-radius: 6px; padding: 9px 11px; color: var(--txt); font-family: 'Commissioner', sans-serif; font-size: 13px; font-weight: 300; outline: none; }
.ic-select:focus, .ic-mini:focus { border-color: var(--cognac); }
.ic-mini::placeholder { color: var(--txt-3); }
.ic-select option { background: var(--surface-2); color: var(--txt); }

.ic-svclist { margin-top: 4px; }
.ic-svcrow { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); }
.ic-svcrow:last-child { border-bottom: none; }
.ic-svcname { flex: 1; font-size: 12px; color: var(--txt); }
.ic-svcprice { font-size: 12px; color: var(--cognac); white-space: nowrap; cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
.ic-svcprice:hover { border-bottom-color: var(--cognac-border); }
.ic-svcprice-input { width: 68px; background: var(--field-bg); border: 1px solid var(--cognac); border-radius: 5px; padding: 4px 7px; color: var(--txt); font-family: 'Commissioner', sans-serif; font-size: 12px; font-weight: 300; outline: none; text-align: right; }
.ic-svcdel { background: none; border: none; color: var(--txt-3); cursor: pointer; font-size: 14px; padding: 0; transition: color 0.15s; }
.ic-svcdel:hover { color: var(--st-postponed-fg); }

.ic-search-wrap { position: relative; margin-top: 10px; }
.ic-search { width: 100%; background: var(--field-bg); border: 1px solid var(--field-border); border-radius: 6px; padding: 9px 11px; color: var(--txt); font-family: 'Commissioner', sans-serif; font-size: 12px; font-weight: 300; outline: none; }
.ic-search:focus { border-color: var(--cognac); }
.ic-search::placeholder { color: var(--txt-3); }
.ic-dd { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface-2); border: 1px solid var(--field-border); border-radius: 6px; max-height: 210px; overflow-y: auto; z-index: 30; display: none; box-shadow: var(--receipt-shadow); }
.ic-dd.open { display: block; }
.ic-opt { padding: 9px 11px; font-size: 12px; color: var(--txt); cursor: pointer; border-bottom: 1px solid var(--line-soft); display: flex; justify-content: space-between; gap: 8px; }
.ic-opt:last-child { border-bottom: none; }
.ic-opt:hover { background: var(--hover); }
.ic-opt .o-name { display: flex; flex-direction: column; gap: 2px; }
.ic-opt .o-hint { font-size: 10px; color: var(--txt-3); font-weight: 300; line-height: 1.3; }
.ic-opt .o-price { color: var(--cognac); white-space: nowrap; align-self: flex-start; }
.ic-opt .o-empty { color: var(--txt-3); font-style: italic; }
.ic-manual { display: flex; gap: 8px; margin-top: 8px; }
.ic-manual .ic-mini { flex: 1; }
.ic-manual-add { background: var(--cognac); border: none; border-radius: 6px; color: #fff; font-size: 16px; width: 34px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.ic-manual-add:hover { background: var(--leather); }

.add-item-btn { width: 100%; background: transparent; border: 1px dashed var(--cognac-border); border-radius: 7px; color: var(--cognac); padding: 12px; font-family: 'Commissioner', sans-serif; font-size: 12px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; margin-top: 2px; }
.add-item-btn:hover { background: var(--accent-soft); }

.cr-deadline-date { margin-top: 10px; display: none; }
.cr-create-btn { width: 100%; background: var(--cognac); border: none; border-radius: 8px; color: #fff; font-family: 'Commissioner', sans-serif; font-size: 13px; letter-spacing: 0.05em; padding: 14px; cursor: pointer; margin-top: 24px; transition: background 0.15s; }
.cr-create-btn:hover { background: var(--leather); }

.receipt-actions { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.btn-share { background: transparent; border: 1px solid var(--cognac-border); border-radius: 6px; color: var(--cognac); font-family: 'Commissioner', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.08em; padding: 8px 14px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.btn-share:hover { background: var(--cognac); color: #fff; }
.btn-share svg { width: 13px; height: 13px; stroke-width: 1.8; }

#receipt { background: #FBF8F3; color: #1E1E1E; border-radius: 8px; padding: 28px 24px; font-family: 'Commissioner', sans-serif; font-weight: 500; box-shadow: var(--receipt-shadow); }
[data-theme="dark"] #receipt { background: var(--linen); }
.r-header { text-align: center; padding-bottom: 16px; border-bottom: 1px solid rgba(58,50,40,0.15); margin-bottom: 16px; }
.r-logo { font-family: 'Tenor Sans', serif; font-size: 12px; letter-spacing: 0.25em; color: var(--brown); text-transform: uppercase; margin-bottom: 3px; }
.r-tag { font-size: 9px; color: #3A3228; letter-spacing: 0.15em; text-transform: uppercase; }
.r-meta { display: flex; justify-content: space-between; font-size: 10px; color: #1E1E1E; margin-bottom: 16px; }
.r-client { background: rgba(160,132,92,0.1); border-radius: 5px; padding: 10px 14px; margin-bottom: 16px; font-size: 11px; }
.r-crow { display: flex; justify-content: space-between; padding: 3px 0; }
.rc-label { color: #3A3228; }
.rc-value { color: var(--brown); font-weight: 600; }
.r-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(58,50,40,0.1); }
.r-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.r-item-title { display: flex; align-items: baseline; margin-bottom: 5px; }
.ri-num { font-family: 'Tenor Sans', serif; font-size: 10px; color: var(--cognac); letter-spacing: 0.15em; white-space: nowrap; }
.ri-name { font-size: 12px; font-weight: 600; color: #1E1E1E; margin-left: 9px; }
.r-svcrow { display: flex; justify-content: space-between; font-size: 12px; color: #1E1E1E; padding: 3px 0; font-weight: 500; }
.rs-price { color: var(--brown); font-weight: 600; }
.r-divider { border: none; border-top: 1px solid rgba(58,50,40,0.2); margin: 16px 0; }
.r-total { display: flex; justify-content: space-between; align-items: baseline; }
.rt-label { font-size: 10px; color: #1E1E1E; text-transform: uppercase; letter-spacing: 0.1em; }
.rt-amount { font-family: 'Tenor Sans', serif; font-size: 20px; color: #1E1E1E; }
.r-note { font-size: 9px; color: rgba(58,50,40,0.75); text-align: center; margin-top: 16px; line-height: 1.6; font-style: italic; }
.r-footer { text-align: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(58,50,40,0.1); font-size: 9px; color: rgba(58,50,40,0.65); letter-spacing: 0.2em; text-transform: uppercase; }
.r-empty { text-align: center; padding: 50px 0; color: rgba(58,50,40,0.3); font-size: 12px; }
.r-empty .icon { font-size: 30px; margin-bottom: 10px; }

/* ═══════════════ МОДАЛКА ДЕТАЛЕЙ ЗАМОВЛЕННЯ ═══════════════ */
.odm-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 300;
  align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
}
.odm-bg.open { display: flex; }
.odm {
  background: var(--bg); border-radius: 14px;
  width: 900px; max-width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  position: relative;
  animation: odmIn 0.18s ease;
}
@keyframes odmIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.odm-close {
  position: absolute; top: 14px; right: 16px;
  cursor: pointer; font-size: 24px; line-height: 1;
  color: var(--txt-2); z-index: 2; padding: 4px 8px; border-radius: 6px;
  transition: background 0.15s;
}
.odm-close:hover { background: var(--hover); }
.odm-scroll { max-height: 88vh; overflow-y: auto; padding: 26px 30px 30px; }

@media (max-width: 768px) {
  .odm-bg { padding: 0; align-items: stretch; }
  .odm { width: 100%; border-radius: 0; min-height: 100vh; }
  .odm-scroll { max-height: 100vh; padding: 20px 18px 30px; }
}

/* ═══════════════ ДЕТАЛЬНА КАРТКА ЗАМОВЛЕННЯ (у модалці) ═══════════════ */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; margin-bottom: 12px; }
.detail-col { display: flex; flex-direction: column; gap: 12px; }
.detail-stack { display: flex; flex-direction: column; gap: 12px; }
.dblock { background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 17px 19px; margin-bottom: 0; }
.dblock-full { grid-column: 1 / -1; }
.detail-top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-right: 26px; }
.detail-edit { margin-left: auto; background: transparent; border: 1px solid var(--cognac-border); border-radius: 7px; color: var(--cognac); font-family: 'Commissioner', sans-serif; font-size: 12px; padding: 7px 14px; cursor: pointer; transition: all 0.15s; }
.detail-edit:hover { background: var(--accent-soft); }
.edit-form { max-width: 620px; }
.edit-item { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.edit-item-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.detail-title { font-family: 'Tenor Sans', serif; font-size: 19px; color: var(--txt); }
.dblock-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--cognac); margin-bottom: 13px; }
.d-client-history { font-size: 12px; color: var(--txt-2); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; }
.d-client-history .h-val { color: var(--txt); }

.d-client-head { display: flex; align-items: center; gap: 13px; margin-bottom: 14px; }
.d-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: 'Tenor Sans', serif; font-size: 16px; color: var(--cognac); flex-shrink: 0; }
.d-client-name { display: flex; align-items: center; gap: 8px; }
.d-client-name span { font-size: 15px; color: var(--txt); }
.d-client-sub { font-size: 12px; color: var(--txt-2); margin-top: 2px; }
.d-comm { display: flex; gap: 8px; flex-wrap: wrap; }
.d-comm-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--line); border-radius: 8px; padding: 8px 13px; color: var(--txt); font-family: 'Commissioner', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; }

#rw-toast {

}

.d-item { padding: 14px 0; border-bottom: 1px solid var(--line); }
.d-item:last-child { border-bottom: none; padding-bottom: 2px; }
.d-item-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.d-item-name { font-size: 14px; color: var(--txt); }
.d-item-num { font-family: 'Tenor Sans', serif; font-size: 10px; color: var(--cognac); letter-spacing: 0.12em; }
.d-item-price { font-size: 14px; color: var(--txt); }
.d-item-detail { font-size: 12px; color: var(--txt-3); margin-bottom: 4px; }
.d-item-svc { font-size: 12px; color: var(--txt-2); margin-bottom: 11px; }
.d-status-row { display: flex; gap: 6px; flex-wrap: wrap; }
.d-status-btn { padding: 7px 13px; border-radius: 16px; font-size: 11px; cursor: pointer; font-family: 'Commissioner', sans-serif; border: 1px solid var(--line); background: transparent; color: var(--txt-2); transition: all 0.15s; }
.d-status-btn:hover { border-color: var(--cognac-border); }
.d-status-btn.done { color: var(--txt); }
.d-status-btn.current { color: #fff; border-color: transparent; }
.d-notify-check { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--txt-2); cursor: pointer; user-select: none; }
.d-check { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--cognac-border); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; transition: all 0.15s; }
.d-check.on { background: #2FA98C; border-color: #2FA98C; }
.d-notify-check:hover .d-check { border-color: var(--cognac); }
.d-markall { background: transparent; border: 1px solid var(--cognac-border); border-radius: 7px; color: var(--cognac); font-family: 'Commissioner', sans-serif; font-size: 11px; padding: 6px 12px; cursor: pointer; letter-spacing: 0; text-transform: none; transition: all 0.15s; }
.d-markall:hover { background: var(--accent-soft); }

.d-pay-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
.d-pay-row .pl { color: var(--txt-2); }
.d-pay-row .pv { color: var(--txt); }
.d-pay-total { display: flex; justify-content: space-between; padding: 9px 0 0; margin-top: 6px; border-top: 1px solid var(--line); }
.d-pay-total .pl { color: var(--txt); font-size: 13px; }
.d-pay-total .pv { font-family: 'Tenor Sans', serif; font-size: 17px; color: var(--txt); }
.d-settle-btn { width: 100%; margin-top: 14px; background: var(--cognac); border: none; border-radius: 8px; color: #fff; font-family: 'Commissioner', sans-serif; font-size: 12px; padding: 11px; cursor: pointer; transition: background 0.15s; }
.d-settle-btn:hover { background: var(--leather); }
.d-bonus-hint { font-size: 11px; color: var(--txt-3); margin-top: 10px; font-style: italic; }
.settle-methods { display: flex; gap: 8px; margin: 12px 0; }
.settle-methods .cr-pill { flex: 1; text-align: center; }
.settle-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 5; border-radius: 14px; }
.settle-card { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 22px; width: 340px; max-width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.3); }

.d-timeline-row { display: flex; gap: 11px; padding: 5px 0; font-size: 12px; }
.d-timeline-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cognac); margin-top: 5px; flex-shrink: 0; }
.d-timeline-txt { flex: 1; color: var(--txt-2); }
.d-timeline-date { color: var(--txt-3); font-size: 11px; }

.d-notify { display: flex; gap: 8px; flex-wrap: wrap; }
.d-notify-btn { background: transparent; border: 1px solid var(--cognac-border); border-radius: 8px; padding: 9px 14px; color: var(--cognac); font-family: 'Commissioner', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.d-notify-btn:hover { background: var(--accent-soft); }
.d-notify-btn svg { width: 14px; height: 14px; stroke-width: 1.8; }

/* ═══════════════ ВКЛАДКА ЗАМОВЛЕННЯ ═══════════════ */
.filters {
  display: flex; align-items: center; gap: 18px;
  padding: 0 28px 14px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.ftab {
  font-size: 12px; color: var(--txt-2); cursor: pointer;
  padding-bottom: 12px; white-space: nowrap;
  border-bottom: 2px solid transparent;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'Commissioner', sans-serif; font-weight: 300;
  transition: color 0.15s;
}
.ftab b { color: var(--cognac); font-weight: 500; margin-left: 3px; }
.ftab.active { color: var(--txt); border-bottom-color: var(--cognac); }
.ftab:hover { color: var(--txt); }
.filters-right { margin-left: auto; display: flex; align-items: center; gap: 10px; padding-bottom: 8px; }
.search-box {
  display: flex; align-items: center; gap: 7px;
  background: var(--field-bg); border: 1px solid var(--field-border);
  border-radius: 7px; padding: 6px 11px;
}
.search-box svg { width: 14px; height: 14px; stroke-width: 1.8; color: var(--txt-3); }
.search-box input {
  background: none; border: none; outline: none;
  color: var(--txt); font-family: 'Commissioner', sans-serif;
  font-size: 12px; font-weight: 300; width: 130px;
}
.search-box input::placeholder { color: var(--txt-3); }

.orders-scroll { flex: 1; overflow-y: auto; padding: 14px 28px 28px; }
.order-row {
  display: grid;
  grid-template-columns: 54px 1.7fr 1.6fr 1.4fr 100px 52px;
  gap: 14px; align-items: center;
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cognac);
  border-radius: 10px;
  padding: 15px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.order-row:hover { background: var(--hover); }
.order-row.urgent-soon { box-shadow: 0 0 0 1px var(--st-postponed-fg); }
.order-num { font-size: 13px; color: var(--txt-2); }
.oc-name { font-size: 14px; color: var(--txt); }
.oc-sub { font-size: 11px; color: var(--txt-3); margin-top: 3px; }
.oc-svc { font-size: 13px; color: var(--txt-2); }
.oc-date { font-size: 12px; color: var(--txt-3); text-align: right; }
.oc-date.warn { color: var(--st-postponed-fg); font-weight: 500; }
.badge {
  font-size: 10px; padding: 3px 9px; border-radius: 11px;
  font-weight: 500; white-space: nowrap; display: inline-block;
}
.b-new { background: var(--st-new-bg); color: var(--st-new-fg); }
.b-work { background: var(--st-work-bg); color: var(--st-work-fg); }
.b-ready { background: var(--st-ready-bg); color: var(--st-ready-fg); }
.b-issued { background: var(--st-issued-bg); color: var(--st-issued-fg); }
.b-partial { background: rgba(47,169,140,0.15); color: #2FA98C; }
.b-postponed { background: var(--st-postponed-bg); color: var(--st-postponed-fg); }
.orders-empty, .orders-loading {
  padding: 60px 20px; text-align: center;
  color: var(--txt-3); font-size: 13px;
}

/* ═══════════════ ВКЛАДКИ КЛІЄНТИ / ФІНАНСИ / СТАТИСТИКА ═══════════════ */
.tab-scroll { flex: 1; overflow-y: auto; padding: 8px 28px 40px; }
.period-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.ptab { padding: 8px 15px; border-radius: 18px; border: 1px solid var(--field-border); background: transparent; color: var(--txt-2); font-family: 'Commissioner', sans-serif; font-size: 12px; font-weight: 300; cursor: pointer; transition: all 0.15s; }
.ptab.active { background: var(--cognac); color: #fff; border-color: var(--cognac); }

.stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 16px 18px; }
.stat-card .sc-label { font-size: 10px; color: var(--txt-3); letter-spacing: 0.05em; margin-bottom: 8px; text-transform: uppercase; }
.stat-card .sc-value { font-family: 'Tenor Sans', serif; font-size: 22px; color: var(--txt); }
.stat-card .sc-value.accent { color: var(--cognac); }

.stat-panel { background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 18px 20px; margin-bottom: 14px; }
.stat-panel-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--cognac); margin-bottom: 16px; }
.stat-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.mini-toggle { display: flex; gap: 6px; }
.mt-btn { padding: 6px 12px; border-radius: 14px; border: 1px solid var(--field-border); background: transparent; color: var(--txt-2); font-family: 'Commissioner', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.mt-btn.active { background: var(--cognac); color: #fff; border-color: var(--cognac); }
.stat-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.bar-item { margin-bottom: 15px; }
.bar-item:last-child { margin-bottom: 0; }
.bar-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 10px; }
.bar-name { font-size: 13px; color: var(--txt); }
.bar-meta { font-size: 12px; color: var(--cognac); white-space: nowrap; }
.bar-track { height: 8px; background: var(--accent-soft); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--cognac); border-radius: 5px; }
.bars-toggle { width: 100%; margin-top: 6px; background: transparent; border: 1px dashed var(--cognac-border); border-radius: 7px; color: var(--cognac); font-family: 'Commissioner', sans-serif; font-size: 11px; padding: 8px; cursor: pointer; transition: all 0.15s; }
.bars-toggle:hover { background: var(--accent-soft); }

.clients-list { display: flex; flex-direction: column; gap: 8px; }
.client-row { display: grid; grid-template-columns: 28px 1.4fr 1.3fr 90px 74px 84px; gap: 12px; align-items: center; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 13px 16px; cursor: pointer; transition: background 0.12s; }
.client-bonus { font-size: 12px; color: var(--txt-3); text-align: right; }
.client-bonus.ready { color: #2FA98C; font-weight: 500; }
.rating-pick { cursor: pointer; border-bottom: 1px dashed var(--cognac-border); }
.rating-pick:hover { color: var(--txt); }
.rating-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.rating-opt { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 9px; border: 1px solid var(--field-border); background: transparent; color: var(--txt); font-family: 'Commissioner', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.rating-opt:hover { border-color: var(--cognac); }
.rating-opt.on { border-color: var(--cognac); background: var(--accent-soft); }
.rating-auto { width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed var(--cognac-border); background: transparent; color: var(--cognac); font-family: 'Commissioner', sans-serif; font-size: 12px; cursor: pointer; }
.rating-auto.on { background: var(--accent-soft); }
.client-row:hover { background: var(--hover); }
.client-dot { font-size: 12px; }
.client-name { font-size: 13px; color: var(--txt); }
.client-phone { font-size: 12px; color: var(--txt-3); }
.client-count { font-size: 11px; color: var(--txt-3); text-align: right; }
.client-sum { font-size: 12px; color: var(--cognac); text-align: right; }
.pay-split { display: flex; gap: 10px; margin-top: 4px; }
.pay-split-item { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 12px 14px; }
.pay-split-item .ps-label { font-size: 10px; color: var(--txt-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.pay-split-item .ps-value { font-family: 'Tenor Sans', serif; font-size: 16px; color: var(--txt); }

.task-add-form { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 18px; }
.task-add-form .cr-input { margin-bottom: 10px; }
.task-add-row { display: flex; gap: 8px; align-items: flex-start; }
.task-order-search { flex: 1; position: relative; }
.task-order-search .ic-mini { width: 100%; }
.task-order-chip { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; background: var(--accent-soft); color: var(--cognac); border-radius: 14px; padding: 5px 10px; font-size: 11px; }
.task-order-chip button { background: none; border: none; color: var(--cognac); cursor: pointer; font-size: 13px; padding: 0; }
.task-add-btn { background: var(--cognac); border: none; border-radius: 8px; color: #fff; font-size: 20px; width: 44px; height: 38px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.task-add-btn:hover { background: var(--leather); }
.task-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; transition: border-color 0.15s; }
.task-row.done { opacity: 0.55; }
.task-row.overdue-row { border-color: var(--st-postponed-fg); background: var(--st-postponed-bg); }
.task-check { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--cognac-border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
.task-check.on { background: #2FA98C; border-color: #2FA98C; }
.task-text { flex: 1; font-size: 13px; color: var(--txt); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.task-row.done .task-text { text-decoration: line-through; }
.task-order { display: inline-block; font-size: 11px; color: var(--cognac); cursor: pointer; padding: 2px 8px; background: var(--accent-soft); border-radius: 10px; }
.task-deadline { font-size: 11px; color: var(--txt-3); }
.task-deadline.overdue { color: var(--st-postponed-fg); font-weight: 500; }
.task-del { background: none; border: none; color: var(--txt-3); cursor: pointer; font-size: 18px; padding: 0 4px; transition: color 0.15s; }
.task-del:hover { color: var(--st-postponed-fg); }
.task-done-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--txt-3); margin: 20px 0 12px; }

/* ═══════════════ КАЛЕНДАР ═══════════════ */
.cal-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
.cal-nav-btn { background: transparent; border: 1px solid var(--field-border); border-radius: 7px; color: var(--txt-2); width: 34px; height: 34px; cursor: pointer; font-size: 16px; transition: all 0.15s; }
.cal-nav-btn:hover { border-color: var(--cognac); color: var(--txt); }
.cal-month { font-family: 'Tenor Sans', serif; font-size: 18px; color: var(--txt); min-width: 190px; }
.cal-today-btn { background: transparent; border: 1px solid var(--cognac-border); border-radius: 7px; color: var(--cognac); padding: 7px 13px; font-family: 'Commissioner', sans-serif; font-size: 12px; cursor: pointer; }
.cal-today-btn:hover { background: var(--accent-soft); }
.cal-filters { margin-left: auto; display: flex; gap: 6px; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txt-3); text-align: center; padding-bottom: 4px; }
.cal-cell { min-height: 92px; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 7px 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; overflow: hidden; }
.cal-cell:hover { border-color: var(--cognac-border); }
.cal-cell.other { opacity: 0.4; }
.cal-cell.today { border-color: var(--cognac); background: var(--accent-soft); }
.cal-daynum { font-size: 12px; color: var(--txt-2); margin-bottom: 5px; }
.cal-cell.today .cal-daynum { color: var(--cognac); font-weight: 500; }
.cal-ev { font-size: 10px; padding: 2px 6px; border-radius: 5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-ev.order { background: rgba(160,132,92,0.16); color: var(--cognac); }
.cal-ev.task { background: rgba(47,169,140,0.16); color: #2FA98C; }
.cal-ev.late { background: var(--st-postponed-bg); color: var(--st-postponed-fg); }
.cal-more { font-size: 9px; color: var(--txt-3); }

.cal-day-list { display: flex; flex-direction: column; gap: 8px; }
.cal-day-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 12px 14px; cursor: pointer; }
.cal-day-item:hover { background: var(--hover); }
.cal-tag { font-size: 10px; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
.cal-tag.order { background: rgba(160,132,92,0.16); color: var(--cognac); }
.cal-tag.task { background: rgba(47,169,140,0.16); color: #2FA98C; }
.cal-day-txt { flex: 1; font-size: 13px; color: var(--txt); }
.cal-day-sub { font-size: 11px; color: var(--txt-3); }

/* ═══════════════ ЗВЕДЕНИЙ ЧЕК ═══════════════ */
.summary-search-wrap { margin-bottom: 4px; }
#summary-matches { margin-top: 4px; }
.summary-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; max-height: 55vh; overflow-y: auto; }
.summary-row { display: grid; grid-template-columns: 22px 60px 1.4fr 1.6fr 90px; gap: 10px; align-items: center; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 11px 14px; cursor: pointer; font-size: 12px; }
.summary-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--cognac); cursor: pointer; }
.sr-num { color: var(--txt-3); }
.sr-name { color: var(--txt); }
.sr-svc { color: var(--txt-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sr-sum { color: var(--cognac); text-align: right; }

#summary-print { background: #FBF8F3; color: #1E1E1E; border-radius: 8px; padding: 32px 28px; font-family: 'Commissioner', sans-serif; max-width: 560px; margin: 0 auto; }
[data-theme="dark"] #summary-print { background: var(--linen); }
.sum-print-header { text-align: center; padding-bottom: 16px; border-bottom: 1px solid rgba(58,50,40,0.15); margin-bottom: 16px; }
.sum-print-logo { font-family: 'Tenor Sans', serif; font-size: 13px; letter-spacing: 0.25em; color: var(--brown); }
.sum-print-tag { font-size: 10px; color: #3A3228; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }
.sum-print-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #1E1E1E; margin-bottom: 18px; }
.sum-order-block { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(58,50,40,0.1); }
.sum-order-head { font-family: 'Tenor Sans', serif; font-size: 11px; color: var(--cognac); letter-spacing: 0.1em; margin-bottom: 8px; }
.sum-svc-row { display: flex; justify-content: space-between; font-size: 13px; color: #1E1E1E; padding: 3px 0; }
.sum-print-total { display: flex; justify-content: space-between; align-items: baseline; padding-top: 14px; border-top: 1px solid rgba(58,50,40,0.2); margin-top: 6px; font-family: 'Tenor Sans', serif; font-size: 19px; }
.sum-print-footer { text-align: center; margin-top: 18px; padding-top: 12px; border-top: 1px solid rgba(58,50,40,0.1); font-size: 9px; color: rgba(58,50,40,0.65); letter-spacing: 0.2em; text-transform: uppercase; }
.sum-actions { display: flex; gap: 10px; margin-top: 20px; max-width: 560px; margin-left: auto; margin-right: auto; }

@media print {
  body * { visibility: hidden; }
  #summary-print, #summary-print * { visibility: visible; }
  #summary-print { position: absolute; top: 0; left: 0; width: 100%; box-shadow: none; }
  .no-print, .odm-close, .nav { display: none !important; }
}

/* ═══════════════ МОБІЛЬНА ВЕРСІЯ ═══════════════ */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .nav {
    width: 100%;
    min-width: 0;
    height: auto;
    flex-direction: row;
    justify-content: space-around;
    position: fixed;

<script>
/* ═══════════════ КОНСТАНТИ ═══════════════ */
const SHEET_ID = "1kDJ893PFa_DTNKt-r8wQES_JFXbJSDNU8niRLz70Aao";
const PRICE_GID = "934403054";
const API_URL = "https://price-production-97b5.up.railway.app/order";

/* ═══════════════ ТЕМА ═══════════════ */
const SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

function applyTheme(theme) {
  document.body.setAttribute("data-theme", theme);
  document.getElementById("theme-icon").outerHTML =
    '<span id="theme-icon">' + (theme === "dark" ? SUN : MOON) + '</span>';
  try { sessionStorage.setItem("rw_theme", theme); } catch(e) {}
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", theme === "dark" ? "#1E1E1E" : "#F0EBE3");
}
function toggleTheme() {
  const cur = document.body.getAttribute("data-theme") || "light";
  applyTheme(cur === "dark" ? "light" : "dark");
}
(function initTheme(){
  let saved = "light";
  try { saved = sessionStorage.getItem("rw_theme") || "light"; } catch(e) {}
  applyTheme(saved);
})();

/* ═══════════════ РОУТИНГ ═══════════════ */
let currentPage = "orders";
function showPage(name) {
  currentPage = name;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(t => t.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.querySelector('.nav-item[data-page="' + name + '"]').classList.add("active");
  if (renderers[name]) renderers[name]();
}

/* Рендерери сторінок — заповнюються нижче по шарах */
const renderers = {};

/* ═══════════════ ШАР ДАНИХ ═══════════════ */
let ORDERS = [], ITEMS = [], PARTNERS = [], TASKS = [];
let ordersFilter = "all", ordersSearch = "";
let dataLoaded = false;

function gv(obj, ...keys) {
  for (const k of keys) { if (obj[k] !== undefined && obj[k] !== "") return obj[k]; }
  return "";
}

async function parseSheet(res, cols) {
  try {
    const text = await res.text();
    // gviz повертає google.visualization.Query.setResponse({...}); — виріжемо JSON надійно
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if (start === -1 || end === -1) return [];
    const json = JSON.parse(text.substring(start, end + 1));
    if (!json.table || !json.table.rows) return [];
    return json.table.rows.map(row => {
      const obj = {};
      const cells = row.c || [];
      cols.forEach((col, i) => {
        const cell = cells[i];
        if (!cell) { obj[col] = ""; return; }
        // Пріоритет: значення .v (сире), потім .f (форматоване)
        let val = (cell.v !== null && cell.v !== undefined) ? cell.v : (cell.f !== undefined ? cell.f : "");
        obj[col] = String(val);
      });
      return obj;
    }).filter(r => {
      const key = r[cols[0]];
      return key && typeof key === "string" && key.indexOf("RW-") === 0;
    });
  } catch(e) { console.error("parseSheet error:", e); return []; }
}

async function parsePartners(res) {
  try {
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, "$1"));
    if (!json.table || !json.table.rows) return [];
    return json.table.rows.map(row => {
      const cell = row.c[0];
      return cell && cell.v ? String(cell.v) : "";
    }).filter(v => v && v !== "Імя" && v !== "Имя");
  } catch(e) { return []; }
}

async function loadData() {
  try {
    const base = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&headers=1&sheet=";
    const [r1, r2, r3, r4] = await Promise.all([
      fetch(base + encodeURIComponent("Замовлення")),
      fetch(base + encodeURIComponent("Вироби")),
      fetch(base + encodeURIComponent("Партнери")),
      fetch(base + encodeURIComponent("Задачі")).catch(() => null)
    ]);
    ORDERS = await parseSheet(r1, ["Номер замовлення","Дата створення","Приймальник","Ім'я клієнта","Телефон","Оплата","Термін","Статус","Примітка","Месенджер","Спосіб передоплати","Сума доплати","Спосіб доплати","Сповіщено","Нараховано бонусів","Списано бонусів","Рейтинг вручну"]);
    ITEMS = await parseSheet(r2, ["Номер замовлення","Номер виробу","Тип","Бренд","Послуги","Сума","Статус","Дата прийому","Дата в роботі","Дата готово","Дата видачі","Сповіщено"]);
    PARTNERS = await parsePartners(r3);
    if (!PARTNERS.length) PARTNERS = ["Сергій"];
    if (r4) { try { TASKS = await parseTasks(r4); } catch(e) { TASKS = []; } }
    dataLoaded = true;
  } catch(e) {
    console.error("loadData error:", e);
    dataLoaded = true;
  }
  if (renderers[currentPage]) renderers[currentPage]();
}

async function parseTasks(res) {
  try {
    const text = await res.text();
    const start = text.indexOf("{"), end = text.lastIndexOf("}");
    if (start === -1) return [];
    const json = JSON.parse(text.substring(start, end + 1));
    if (!json.table || !json.table.rows) return [];
    const cols = ["Текст","Замовлення","Статус","Створено","Виконано","Дедлайн"];
    return json.table.rows.map(row => {
      const obj = {}; const cells = row.c || [];
      cols.forEach((col, i) => {
        const cell = cells[i];
        obj[col] = cell && cell.v != null ? String(cell.v) : "";
      });
      return obj;
    }).filter(t => t["Текст"]);
  } catch(e) { return []; }
}

function extractAmt(str) {
  if (!str || typeof str !== "string") return 0;
  const m = str.replace(/\s/g, "").match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

/* ─── СТАТУСИ ─── */
function getStatus(num) {
  const its = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  if (!its.length) return "new";
  const issued = its.filter(i => gv(i,"Статус") === "📦 Виданий").length;
  if (issued === its.length) return "issued";
  if (issued > 0) return "partial";
  if (its.some(i => gv(i,"Статус") === "✅ Готово")) return "ready";
  if (its.some(i => gv(i,"Статус") === "⚙️ В роботі")) return "work";
  if (its.some(i => gv(i,"Статус") === "⏳ Відкладено")) return "postponed";
  return "new";
}
const STATUS_META = {
  new:["Новий","b-new"], work:["В роботі","b-work"], ready:["Готово","b-ready"],
  issued:["Виданий","b-issued"], partial:["Частково видано","b-partial"], postponed:["Відкладено","b-postponed"]
};
const STATUS_ACCENT = { new:"#378ADD", work:"#EF9F27", ready:"#639922", issued:"#B4B2A9", partial:"#2FA98C", postponed:"#E24B4A" };

/* Чи горить термін: термінові — завжди, звичайні — за 3 дні до дати */
function deadlineWarn(o) {
  const term = gv(o,"Термін");
  if (getStatus(gv(o,"Номер замовлення")) === "issued") return false;
  if (term.includes("Терміново")) return true;
  const d = parseDeadline(term);
  if (!d) return false;
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = (d - now) / 86400000;
  return diff >= 0 && diff <= 3;
}
function parseDeadline(str) {
  if (!str) return null;
  const m = str.match(/(\d{1,2})\.(\d{1,2})(?:\.(\d{2,4}))?/);
  if (!m) return null;
  const day = parseInt(m[1]), mon = parseInt(m[2]) - 1;
  let year = m[3] ? parseInt(m[3]) : new Date().getFullYear();
  if (year < 100) year += 2000;
  return new Date(year, mon, day);
}

function statusBadge(num) {
  const m = STATUS_META[getStatus(num)];
  return "<span class='badge " + m[1] + "'>" + m[0] + "</span>";
}

/* Послуги замовлення одним рядком */
function orderServices(num) {
  const its = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  const names = [];
  its.forEach(i => {
    (gv(i,"Послуги") || "").split(",").forEach(s => {
      const k = s.trim().split("—")[0].trim();
      if (k && names.indexOf(k) === -1) names.push(k);
    });
  });
  return names.slice(0,3).join(", ") || "—";
}
function orderItemName(num) {
  const its = ITEMS.filter(i => gv(i,"Номер замовлення") === num);
  if (!its.length) return "—";
  const first = its[0];
  const t = gv(first,"Тип"), b = gv(first,"Бренд");
  let name = [t, b].filter(Boolean).join(" · ") || "Виріб";
  if (its.length > 1) name += " +" + (its.length - 1);
  return name;
}

/* ═══════════════ ПРАЙС (Google Sheets) ═══════════════ */
const CATEGORY_LABELS = { shoes: "Взуття", bags: "Сумка" };
let PRICE = {};
let priceLoaded = false;

async function loadPrice() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&gid=" + PRICE_GID;
    const r = await fetch(url);
    const txt = await r.text();
    const json = JSON.parse(txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1));
    PRICE = {};
    json.table.rows.forEach(function(row){
      const c = row.c; if (!c) return;
      const category = c[0] && c[0].v ? String(c[0].v).trim() : "";
      const deptName = c[2] && c[2].v ? String(c[2].v).trim() : "";
      const svcName  = c[3] && c[3].v ? String(c[3].v).trim() : "";
      const unit     = c[4] && c[4].v ? String(c[4].v).trim() : "";
      const price    = c[5] && c[5].v != null ? parseInt(c[5].v) : 0;
      if (!category || !deptName || !svcName) return;
      if (!PRICE[category]) PRICE[category] = { label: CATEGORY_LABELS[category] || category, departments: {} };
      if (!PRICE[category].departments[deptName]) PRICE[category].departments[deptName] = [];
      PRICE[category].departments[deptName].push({ name: svcName, price: price, unit: unit });
    });
    priceLoaded = true;
    if (currentPage === "create") renderers.create();
  } catch(err) { console.error("Price load error:", err); priceLoaded = true; }
}

const SVC_HINTS = {
  "літнє взуття":   "сандалі, босоніжки, шльопанці, сабо, мюлі, еспадрильї",

};

}

function renderMsgPick() {

}

/* Знайти месенджер клієнта з останнього замовлення */
function clientMessenger(phone) {
  const orders = ORDERS.filter(o => gv(o,"Телефон") === phone && gv(o,"Месенджер"));
  if (!orders.length) return "";
  return gv(orders[orders.length - 1], "Месенджер");
}

/* Автопідстановка клієнта за історією замовлень */
function knownClients() {
  const map = {};
  ORDERS.forEach(o => {
    const phone = gv(o,"Телефон"), name = gv(o,"Ім'я клієнта");
    if (phone && !map[phone]) map[phone] = { name: name, phone: phone };
  });
  return Object.values(map);
}
function onClientInput(v) {
  NO.client = v;
  updateReceipt();
  showClientSuggest(v, "name");
}
function onPhoneInput(v) {
  NO.phone = v;
  updateReceipt();
  showClientSuggest(v, "phone");
}
function showClientSuggest(q, field) {
  const dd = document.getElementById("cr-suggest");
  if (!dd) return;
  q = q.trim().toLowerCase();
  if (!q) { dd.classList.remove("open"); return; }
  const matches = knownClients().filter(c =>
    (field === "phone" ? c.phone : c.name).toLowerCase().includes(q)
  ).slice(0, 5);
  if (!matches.length) { dd.classList.remove("open"); return; }
  dd.innerHTML = matches.map(c =>
    "<div class='cr-suggest-opt' onclick=\"pickClient('" + c.phone.replace(/'/g,"") + "')\"><span>" + c.name + "</span><span class='sug-phone'>" + c.phone + "</span></div>"
  ).join("");
  dd.classList.add("open");
}
function pickClient(phone) {
  const c = knownClients().find(x => x.phone === phone);
  if (!c) return;
  NO.client = c.name; NO.phone = c.phone;
  document.getElementById("cr-client").value = c.name;
  document.getElementById("cr-phone").value = c.phone;
  document.getElementById("cr-suggest").classList.remove("open");
  const msg = clientMessenger(phone);
  if (msg) { NO.messenger = msg; renderMsgPick(); }
  updateReceipt();
}

function setPay(type, btn) {
  NO.payment = type;
  document.querySelectorAll("#cr-pay .cr-pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("cr-prepay").style.display = type === "Передоплата" ? "block" : "none";
  const pm = document.getElementById("cr-prepay-method");
  if (pm) pm.style.display = type === "Передоплата" ? "flex" : "none";
}
function setPrepayMethod(m, btn) {
  NO.prepayMethod = (NO.prepayMethod === m) ? "" : m;
  document.querySelectorAll("#cr-prepay-method .cr-pill").forEach(b => b.classList.remove("active"));
  if (NO.prepayMethod) btn.classList.add("active");
}
function setDeadline(val, btn) {
  document.querySelectorAll("#cr-deadline .cr-pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const di = document.getElementById("cr-deadline-date");
  if (val === "date") { di.style.display = "block"; NO.deadline = ""; di.focus && di.focus(); }
  else { di.style.display = "none"; NO.deadline = val; }
}
function formatDeadlineDate(iso) {
  if (!iso) return "";
  const p = iso.split("-");
  if (p.length !== 3) return iso;
  return p[2] + "." + p[1] + "." + p[0];
}

function addItem() {
  if (!priceLoaded) return;
  itemCounter++;
  const cat = firstCategory();
  NO.items.push({ id: itemCounter, category: cat, department: firstDept(cat), itemType: "", brand: "", services: [] });
  renderItems(); updateReceipt();
}
function removeItem(id) { NO.items = NO.items.filter(i => i.id !== id); renderItems(); updateReceipt(); }
function changeCategory(id, val) { const it = NO.items.find(i=>i.id===id); it.category=val; it.department=firstDept(val); renderItems(); updateReceipt(); }
function changeDept(id, val) { const it = NO.items.find(i=>i.id===id); it.department=val; renderItems(); updateReceipt(); }
function updateItemType(id, val) { const it = NO.items.find(i=>i.id===id); it.itemType=val; updateReceipt(); }
function updateItemBrand(id, val) { const it = NO.items.find(i=>i.id===id); it.brand=val; updateReceipt(); }
function addSvc(id, name, price) { const it = NO.items.find(i=>i.id===id); it.services.push({name:name, price:parseInt(price)}); renderItems(); updateReceipt(); }
function removeSvc(itemId, idx) { const it = NO.items.find(i=>i.id===itemId); it.services.splice(idx,1); renderItems(); updateReceipt(); }

function editSvcPrice(itemId, idx, el) {
  const it = NO.items.find(i=>i.id===itemId);
  if (!it || !it.services[idx]) return;
  const cur = it.services[idx].price;
  const input = document.createElement("input");
  input.type = "number";
  input.className = "ic-svcprice-input";
  input.value = cur;
  const commit = () => {
    const v = parseInt(input.value);
    it.services[idx].price = (!isNaN(v) && v >= 0) ? v : cur;
    renderItems(); updateReceipt();
  };
  input.onblur = commit;
  input.onkeydown = (e) => { if (e.key === "Enter") input.blur(); if (e.key === "Escape") { input.value = cur; input.blur(); } };
  el.replaceWith(input);
  input.focus(); input.select();
}

function openSvcDD(id) { renderSvcDD(id, ""); const dd = document.getElementById("ic-dd-"+id); if (dd) dd.classList.add("open"); }
function filterSvc(id) { const inp = document.getElementById("ic-search-"+id); renderSvcDD(id, inp?inp.value:""); const dd = document.getElementById("ic-dd-"+id); if (dd) dd.classList.add("open"); }
function renderSvcDD(id, query) {
  const it = NO.items.find(i=>i.id===id);
  const dd = document.getElementById("ic-dd-"+id);
  if (!it || !dd) return;
  const services = itemServices(it);
  const q = query.trim().toLowerCase();
  if (!services.length) { dd.innerHTML = "<div class='ic-opt'><span class='o-empty'>Спочатку оберіть відділ</span></div>"; return; }
  let html = "";
  services.forEach((s, i) => {
    if (q && s.name.toLowerCase().indexOf(q) === -1) return;
    const hint = svcHint(s.name);
    html += "<div class='ic-opt' onclick='selectSvc(" + id + "," + i + ")'><span class='o-name'>" + s.name +
      (hint ? "<span class='o-hint'>" + hint + "</span>" : "") + "</span><span class='o-price'>" + s.price + " ₴</span></div>";
  });
  dd.innerHTML = html || "<div class='ic-opt'><span class='o-empty'>Нічого не знайдено</span></div>";
}
function selectSvc(id, i) { const it = NO.items.find(x=>x.id===id); const s = itemServices(it)[i]; if (s) addSvc(id, s.name, s.price); }
function addManualSvc(id) {
  const n = document.getElementById("ic-man-name-"+id).value.trim();
  const p = parseInt(document.getElementById("ic-man-price-"+id).value || "0");
  if (!n || !p) { alert("Вкажіть назву та ціну"); return; }
  addSvc(id, "📝 " + n, p);
}

function renderItems() {
  const box = document.getElementById("cr-items");
  if (!box) return;
  box.innerHTML = "";
  NO.items.forEach((item, idx) => {
    const catData = PRICE[item.category]; if (!catData) return;
    const catOpts = Object.keys(PRICE).map(k => "<option value='"+k+"'"+(k===item.category?" selected":"")+">"+PRICE[k].label+"</option>").join("");
    const deptOpts = Object.keys(catData.departments).map(d => "<option value=\""+d.replace(/"/g,"&quot;")+"\""+(d===item.department?" selected":"")+">"+d+"</option>").join("");
    const svcRows = item.services.map((s,si) => "<div class='ic-svcrow'><span class='ic-svcname'>"+s.name+"</span><span class='ic-svcprice' onclick='editSvcPrice("+item.id+","+si+",this)'>"+s.price+" ₴</span><button class='ic-svcdel' onclick='removeSvc("+item.id+","+si+")'>×</button></div>").join("");
    const itemTypeVal = (item.itemType||"").replace(/"/g,"&quot;");
    const brandVal = (item.brand||"").replace(/"/g,"&quot;");
    const div = document.createElement("div");
    div.className = "itemcard";
    div.innerHTML =
      "<div class='itemcard-head'><span class='itemcard-num'>№"+(idx+1)+"</span><button class='itemcard-rm' onclick='removeItem("+item.id+")'>×</button></div>" +
      "<div class='ic-row'><div class='ic-field'><label>КАТЕГОРІЯ</label><select class='ic-select' onchange='changeCategory("+item.id+",this.value)'>"+catOpts+"</select></div>" +
      "<div class='ic-field'><label>ВІДДІЛ</label><select class='ic-select' onchange='changeDept("+item.id+",this.value)'>"+deptOpts+"</select></div></div>" +
      "<div class='ic-row'>" +
        "<div class='ic-field'><label>ТИП ВИРОБУ</label><input class='ic-mini' placeholder='Туфлі, чоботи, сумка...' value=\""+itemTypeVal+"\" oninput='updateItemType("+item.id+",this.value)'></div>" +
        "<div class='ic-field'><label>БРЕНД</label><input class='ic-mini' placeholder=\"Необов'язково\" value=\""+brandVal+"\" oninput='updateItemBrand("+item.id+",this.value)'></div>" +
      "</div>" +
      "<div class='ic-svclist'>"+svcRows+"</div>" +
      "<div class='ic-search-wrap'><input type='text' class='ic-search' id='ic-search-"+item.id+"' placeholder='Пошук або вибір послуги...' autocomplete='off' oninput='filterSvc("+item.id+")' onfocus='openSvcDD("+item.id+")'><div class='ic-dd' id='ic-dd-"+item.id+"'></div></div>" +
      "<div class='ic-manual'><input class='ic-mini' id='ic-man-name-"+item.id+"' placeholder='Своя послуга...'><input class='ic-mini' style='width:88px;flex:none' type='number' id='ic-man-price-"+item.id+"' placeholder='₴'><button class='ic-manual-add' onclick='addManualSvc("+item.id+")'>+</button></div>";
    box.appendChild(div);
  });
}

function updateReceipt() {
  const receipt = document.getElementById("receipt");
  if (!receipt) return;
  const hasSvc = NO.items.some(i => i.services.length > 0);
  if (!hasSvc) {
    receipt.innerHTML = "<div class='r-empty'><div class='icon'>🧾</div>Додайте річ та послуги — тут з'явиться кошторис</div>";
    return;
  }
  const now = new Date();
  const dateStr = now.toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit",year:"numeric"});
  const timeStr = now.toLocaleTimeString("uk-UA",{hour:"2-digit",minute:"2-digit"});
  let total = 0, itemsHTML = "";
  NO.items.forEach((item, idx) => {
    if (!item.services.length) return;
    item.services.forEach(s => total += s.price);
    const svcs = item.services.map(s => "<div class='r-svcrow'><span>"+s.name+"</span><span class='rs-price'>"+s.price+" ₴</span></div>").join("");
    const label = [item.itemType, item.brand].filter(Boolean).join(" · ");
    itemsHTML += "<div class='r-item'><div class='r-item-title'><span class='ri-num'>№"+(idx+1)+"</span>"+(label?"<span class='ri-name'>"+label+"</span>":"")+"</div>"+svcs+"</div>";
  });
  let clientHTML = "";
  if (NO.client || NO.phone) {
    clientHTML = "<div class='r-client'>";
    if (NO.client) clientHTML += "<div class='r-crow'><span class='rc-label'>Клієнт</span><span class='rc-value'>"+NO.client+"</span></div>";
    if (NO.phone) clientHTML += "<div class='r-crow'><span class='rc-label'>Телефон</span><span class='rc-value'>"+NO.phone+"</span></div>";
    clientHTML += "</div>";
  }
  receipt.innerHTML =
    "<div class='r-header'><div class='r-logo'>REWISE · STUDIO</div><div class='r-tag'>Попередній кошторис</div></div>" +
    "<div class='r-meta'><span>"+dateStr+", "+timeStr+"</span></div>" + clientHTML +
    "<div class='r-items'>"+itemsHTML+"</div>" +
    (total>0 ? "<hr class='r-divider'><div class='r-total'><span class='rt-label'>Разом</span><span class='rt-amount'>"+total+" ₴</span></div><p class='r-note'>Остаточна вартість узгоджується після огляду речі.<br>Кошторис дійсний протягом 7 днів.</p>" : "") +
    "<div class='r-footer'>rewise-studio · ukraine</div>";
}

function shareReceipt() {

async function submitOrder() {
  if (!NO.manager) { alert("Оберіть приймальника"); return; }
  NO.client = document.getElementById("cr-client").value.trim();
  NO.phone = document.getElementById("cr-phone").value.trim();
  if (!NO.client) { alert("Введіть ім'я клієнта"); return; }
  if (!NO.phone) { alert("Введіть телефон"); return; }
  const validItems = NO.items.filter(i => i.services.length > 0);
  if (!validItems.length) { alert("Додайте хоча б одну послугу"); return; }
  if (!NO.payment) { alert("Оберіть тип оплати"); return; }
  if (!NO.deadline) {
    const dv = document.getElementById("cr-deadline-date").value.trim();
    if (!dv) { alert("Вкажіть термін"); return; }
    NO.deadline = formatDeadlineDate(dv);
  }
  let paymentStr = NO.payment;
  if (NO.payment === "Передоплата" && NO.prepay) paymentStr = "Передоплата: " + parseInt(NO.prepay).toLocaleString("uk-UA") + " ₴";

  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const dateStr = pad(now.getDate())+"."+pad(now.getMonth()+1)+"."+now.getFullYear()+" "+pad(now.getHours())+":"+pad(now.getMinutes());

  const payload = {
    date: dateStr, manager: NO.manager, client: NO.client, phone: NO.phone,
    payment: paymentStr, deadline: NO.deadline, messenger: NO.messenger || "",
    prepayMethod: NO.payment === "Передоплата" ? (NO.prepayMethod || "") : "",
    prepay: NO.payment === "Передоплата" && NO.prepay ? parseInt(NO.prepay) : 0,
    items: validItems.map(item => {
      const total = item.services.reduce((s,x)=>s+x.price,0);
      const catLabel = PRICE[item.category] ? PRICE[item.category].label : item.category;
      return {
        type: item.itemType || catLabel,
        brand: item.brand || "",
        services: item.services.map(s=>s.name).join(", "),
        total: total.toLocaleString("uk-UA") + " ₴"
      };
    })
  };

  const btn = document.querySelector(".cr-create-btn");
  btn.textContent = "Збереження...";
  btn.disabled = true;
  try {
    const res = await fetch(API_URL, { method:"POST", mode:"cors", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
    const result = await res.json();
    if (result.status === "ok") {
      btn.textContent = "✓ " + (result.order_num || "Збережено");
      NO = { manager: NO.manager, client:"", phone:"", messenger:"", items:[], payment:"", prepay:"", prepayMethod:"", deadline:"" };
      itemCounter = 0;
      setTimeout(() => { loadData(); showPage("orders"); }, 1200);
    } else {
      alert("Помилка: " + result.message); btn.textContent = "Створити замовлення"; btn.disabled = false;
    }
  } catch(e) {
    alert("Помилка збереження: " + e.message); btn.textContent = "Створити замовлення"; btn.disabled = false;
  }
}

/* ═══════════════ ПЕРІОД (спільний для вкладок) ═══════════════ */
let periodSel = { clients: "all", finance: "month", stats: "month" };
const PERIODS = [["week","Тиждень"],["month","Місяць"],["year","Рік"],["all","Весь час"]];
function periodStart(key) {
  const now = new Date();
  if (key === "week") { const d = new Date(now); d.setDate(d.getDate()-7); return d; }
  if (key === "month") { const d = new Date(now); d.setMonth(d.getMonth()-1); return d; }
  if (key === "year") { const d = new Date(now); d.setFullYear(d.getFullYear()-1); return d; }
  return null;
}
function orderDate(o) {
  const s = gv(o,"Дата створення");
  const m = s.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
}
function ordersInPeriod(key) {
  const from = periodStart(key);
  if (!from) return ORDERS.slice();
  return ORDERS.filter(o => { const d = orderDate(o); return d && d >= from; });
}
function orderTotal(num) {
  return ITEMS.filter(i => gv(i,"Номер замовлення") === num)
    .reduce((s,it) => s + extractAmt(gv(it,"Сума")), 0);
}
function periodTabsHTML(tabKey) {
  return "<div class='period-tabs'>" + PERIODS.map(([k,label]) =>
    "<button class='ptab" + (periodSel[tabKey]===k?" active":"") + "' onclick=\"setPeriod('" + tabKey + "','" + k + "')\">" + label + "</button>"
  ).join("") + "</div>";
}
function setPeriod(tabKey, val) { periodSel[tabKey] = val; renderers[tabKey](); }
const barsExpanded = {};
function barsHTML(data, unit, panelId) {
  const max = Math.max(1, ...data.map(d => d[1]));
  const total = data.reduce((s,d) => s + d[1], 0) || 1;
  const expanded = panelId ? !!barsExpanded[panelId] : true;
  const limit = expanded ? 15 : 5;
  const shown = data.slice(0, limit);
  const rows = shown.map(d => {
    const pct = Math.round(d[1] / total * 100);
    const w = Math.round(d[1] / max * 100);
    const valStr = unit === "₴" ? d[1].toLocaleString("uk-UA") + " ₴" : d[1];
    return "<div class='bar-item'>" +
      "<div class='bar-head'><span class='bar-name'>" + d[0] + "</span>" +
      "<span class='bar-meta'>" + pct + "% · " + valStr + "</span></div>" +
      "<div class='bar-track'><div class='bar-fill' style='width:" + w + "%'></div></div>" +
    "</div>";
  }).join("");
  const canToggle = panelId && data.length > 5;
  const toggleBtn = canToggle ?
    "<button class='bars-toggle' onclick=\"toggleBarsExpand('" + panelId + "')\">" +
      (expanded ? "Згорнути" : "Показати ще (" + Math.min(data.length, 15) + ")") +
    "</button>" : "";
  return rows + toggleBtn;
}
function toggleBarsExpand(panelId) {
  barsExpanded[panelId] = !barsExpanded[panelId];
  if (renderers[currentPage]) renderers[currentPage]();
}

renderers.finance = function() {
  const page = document.getElementById("page-finance");
  const orders = ordersInPeriod(periodSel.finance);

  let revenue = 0, prepaySum = 0, settleSum = 0;
  const byMethod = { "Готівка": 0, "Картка": 0, "ФОП": 0 };
  orders.forEach(o => {
    const num = gv(o,"Номер замовлення");
    revenue += orderTotal(num);
    const pAmt = extractAmt(gv(o,"Оплата"));
    const pM = gv(o,"Спосіб передоплати");
    if (gv(o,"Оплата").includes("Передоплата") && pAmt) { prepaySum += pAmt; if (byMethod[pM] !== undefined) byMethod[pM] += pAmt; }
    const sAmt = extractAmt(gv(o,"Сума доплати"));
    const sM = gv(o,"Спосіб доплати");
    if (sAmt) { settleSum += sAmt; if (byMethod[sM] !== undefined) byMethod[sM] += sAmt; }
  });
  const avg = orders.length ? Math.round(revenue / orders.length) : 0;
  const collected = prepaySum + settleSum;

  page.innerHTML =
    "<div class='page-header'><div class='page-title'>Фінанси</div></div>" +
    "<div class='tab-scroll'>" +
      periodTabsHTML("finance") +
      "<div class='stat-cards'>" +
        statCard("Обіг", revenue.toLocaleString("uk-UA") + " ₴", true) +
        statCard("Середній чек", avg.toLocaleString("uk-UA") + " ₴") +
        statCard("Отримано коштів", collected.toLocaleString("uk-UA") + " ₴") +
        statCard("Замовлень", orders.length) +
      "</div>" +
      "<div class='stat-panel'><div class='stat-panel-label'>Надходження за способом оплати</div>" +
        "<div class='pay-split'>" +
          paySplit("Готівка", byMethod["Готівка"]) +
          paySplit("Картка", byMethod["Картка"]) +
          paySplit("ФОП", byMethod["ФОП"]) +
        "</div>" +
      "</div>" +
    "</div>";
};
function statCard(label, value, accent) {

renderers.stats = function() {
  const page = document.getElementById("page-stats");
  const orders = ordersInPeriod(periodSel.stats);
  const orderNums = new Set(orders.map(o => gv(o,"Номер замовлення")));

  // Клієнти
  const phones = {};
  orders.forEach(o => { const p = gv(o,"Телефон"); if (p) phones[p] = (phones[p]||0)+1; });
  const totalClients = Object.keys(phones).length;
  const repeat = Object.values(phones).filter(c => c > 1).length;

  // Топ послуг
  const svcCount = {};
  ITEMS.filter(i => orderNums.has(gv(i,"Номер замовлення"))).forEach(it => {
    (gv(it,"Послуги")||"").split(",").forEach(s => {
      const k = s.trim().split("—")[0].trim();
      if (k) svcCount[k] = (svcCount[k]||0)+1;
    });
  });
  const topSvc = Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).map(e=>[e[0],e[1]]);

  // По приймальниках (оборот)
  const byMgr = {};
  orders.forEach(o => { const m = gv(o,"Приймальник")||"—"; byMgr[m] = (byMgr[m]||0) + orderTotal(gv(o,"Номер замовлення")); });
  const mgrData = Object.entries(byMgr).sort((a,b)=>b[1]-a[1]).map(e=>[e[0],e[1]]);

  // Топ клієнтів (за сумою або кількістю — перемикач)
  const clientAgg = {};
  orders.forEach(o => {
    const phone = gv(o,"Телефон"); if (!phone) return;
    const name = gv(o,"Ім'я клієнта") || phone;
    if (!clientAgg[phone]) clientAgg[phone] = { name, sum: 0, count: 0 };
    clientAgg[phone].sum += orderTotal(gv(o,"Номер замовлення"));
    clientAgg[phone].count += 1;
  });
  const clientList = Object.values(clientAgg);
  const topClientsBySum = [...clientList].sort((a,b)=>b.sum-a.sum).map(c=>[c.name, c.sum]);
  const topClientsByCount = [...clientList].sort((a,b)=>b.count-a.count).map(c=>[c.name, c.count]);
  window._topClientsBySum = topClientsBySum;
  window._topClientsByCount = topClientsByCount;

  page.innerHTML =
    "<div class='page-header'><div class='page-title'>Статистика</div></div>" +
    "<div class='tab-scroll'>" +
      periodTabsHTML("stats") +
      "<div class='stat-cards'>" +
        statCard("Замовлень", orders.length) +
        statCard("Клієнтів", totalClients) +
        statCard("Повторних", repeat) +
        statCard("Виробів", ITEMS.filter(i=>orderNums.has(gv(i,"Номер замовлення"))).length) +
      "</div>" +
      punctualityPanel(orders) +
      "<div class='stat-cols'>" +
        "<div class='stat-panel'><div class='stat-panel-label'>Топ послуг</div>" + (topSvc.length ? barsHTML(topSvc, "", "svc") : "<div style='color:var(--txt-3);font-size:12px'>Немає даних</div>") + "</div>" +
        "<div class='stat-panel'>" +
          "<div class='stat-panel-head'><div class='stat-panel-label' style='margin:0'>Топ клієнтів</div>" +
            "<div class='mini-toggle'>" +
              "<button class='mt-btn" + (topClientsMode==="sum"?" active":"") + "' id='tc-sum-btn' onclick='setTopClientsMode(\"sum\")'>За сумою</button>" +
              "<button class='mt-btn" + (topClientsMode==="count"?" active":"") + "' id='tc-count-btn' onclick='setTopClientsMode(\"count\")'>За кількістю</button>" +
            "</div></div>" +
          "<div id='top-clients-bars'>" + ((topClientsMode==="sum"?topClientsBySum:topClientsByCount).length ? barsHTML(topClientsMode==="sum"?topClientsBySum:topClientsByCount, topClientsMode==="sum"?"₴":"", "clients") : "<div style='color:var(--txt-3);font-size:12px'>Немає даних</div>") + "</div>" +
        "</div>" +
        "<div class='stat-panel'><div class='stat-panel-label'>По приймальниках</div>" + (mgrData.length ? barsHTML(mgrData, "₴", "mgr") : "<div style='color:var(--txt-3);font-size:12px'>Немає даних</div>") + "</div>" +
      "</div>" +
    "</div>";
};

let topClientsMode = "sum";
function setTopClientsMode(mode) {

  const box = document.getElementById("top-clients-bars");

let taskAddOrder = "";

renderers.tasks = function() {
  const page = document.getElementById("page-tasks");
  let active = TASKS.filter(t => t["Статус"] !== "так");
  const done = TASKS.filter(t => t["Статус"] === "так");

  // Сортування активних задач: спочатку прострочені, потім за найближчим дедлайном, без дедлайну — в кінці
  function sortKey(t) {
    const d = parseDeadline(t["Дедлайн"]);
    return d ? d.getTime() : Infinity;
  }
  active = active.sort((a,b) => sortKey(a) - sortKey(b));

  function isOverdue(t) {
    if (t["Статус"] === "так") return false;
    const d = parseDeadline(t["Дедлайн"]);
    if (!d) return false;
    const now = new Date(); now.setHours(0,0,0,0);
    return d.getTime() < now.getTime();
  }

  function taskRow(t) {
    const isDone = t["Статус"] === "так";
    const overdue = isOverdue(t);
    const num = t["Замовлення"];
    const order = num ? "<span class='task-order' onclick=\"openOrder('" + num + "')\">" + num.replace("RW-","#") + "</span>" : "";
    const deadline = t["Дедлайн"] ? "<span class='task-deadline" + (overdue?" overdue":"") + "'>" + (overdue?"⚠ ":"") + t["Дедлайн"] + "</span>" : "";
    const created = (t["Створено"]||"").replace(/"/g,"&quot;");
    const txt = (t["Текст"]||"").replace(/"/g,"&quot;");
    return "<div class='task-row" + (isDone?" done":"") + (overdue?" overdue-row":"") + "'>" +
      "<span class='task-check" + (isDone?" on":"") + "' onclick=\"toggleTask('" + txt.replace(/'/g,"\\'") + "','" + created.replace(/'/g,"\\'") + "'," + (!isDone) + ")\">" + (isDone?"✓":"") + "</span>" +
      "<span class='task-text'>" + t["Текст"] + order + deadline + "</span>" +
      "<button class='task-del' onclick=\"deleteTask('" + txt.replace(/'/g,"\\'") + "','" + created.replace(/'/g,"\\'") + "')\">×</button>" +
    "</div>";
  }

  const orderChip = taskAddOrder ?
    "<span class='task-order-chip'>" + taskAddOrder.replace("RW-","#") + "<button onclick='clearTaskOrder()'>×</button></span>" : "";

  page.innerHTML =
    "<div class='page-header'><div class='page-title'>Задачі</div></div>" +
    "<div class='tab-scroll'>" +
      "<div class='task-add-form'>" +
        "<input class='cr-input' id='task-input' placeholder='Нова задача...' style='margin-bottom:0' onkeydown='if(event.key===\"Enter\")addTask()'>" +
        "<div class='task-add-row'>" +
          "<div class='task-order-search'>" +
            "<input class='ic-mini' id='task-order-input' placeholder='Прив\\'язати замовлення...' autocomplete='off' oninput='filterTaskOrders(this.value)' onfocus='filterTaskOrders(this.value)'>" +
            "<div class='ic-dd' id='task-order-dd'></div>" +
            orderChip +
          "</div>" +
          "<input class='ic-mini' id='task-deadline-input' type='date' style='max-width:150px'>" +
          "<button class='task-add-btn' onclick='addTask()'>+</button>" +
        "</div>" +
      "</div>" +
      (active.length ? active.map(taskRow).join("") : "<div style='color:var(--txt-3);font-size:13px;padding:20px 0;text-align:center'>Немає активних задач</div>") +
      (done.length ? "<div class='task-done-label'>Виконані</div>" + done.map(taskRow).join("") : "") +
    "</div>";
};

function filterTaskOrders(q) {
  q = (q||"").trim().toLowerCase();
  const dd = document.getElementById("task-order-dd");
  if (!dd) return;
  if (!q) { dd.classList.remove("open"); return; }
  const matches = ORDERS.filter(o =>
    gv(o,"Номер замовлення").toLowerCase().includes(q) || gv(o,"Ім'я клієнта").toLowerCase().includes(q)
  ).slice(0, 6);
  if (!matches.length) { dd.innerHTML = "<div class='ic-opt'><span class='o-empty'>Нічого не знайдено</span></div>"; dd.classList.add("open"); return; }
  dd.innerHTML = matches.map(o => {
    const num = gv(o,"Номер замовлення");
    return "<div class='ic-opt' onclick=\"pickTaskOrder('" + num + "')\"><span class='o-name'>" + num.replace("RW-","#") + " · " + gv(o,"Ім'я клієнта") + "</span></div>";
  }).join("");
  dd.classList.add("open");
}
function pickTaskOrder(num) {
  taskAddOrder = num;
  document.getElementById("task-order-dd").classList.remove("open");
  renderers.tasks();
}
function clearTaskOrder() { taskAddOrder = ""; renderers.tasks(); }

async function addTask() {
  const input = document.getElementById("task-input");
  const text = input.value.trim();
  if (!text) return;
  const deadlineRaw = document.getElementById("task-deadline-input").value;
  const deadline = deadlineRaw ? formatDeadlineDate(deadlineRaw) : "";
  const order = taskAddOrder;
  const created = new Date().toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit",year:"numeric"}) + " " + new Date().toLocaleTimeString("uk-UA",{hour:"2-digit",minute:"2-digit"});
  TASKS.push({ "Текст": text, "Замовлення": order, "Статус": "ні", "Створено": created, "Виконано": "", "Дедлайн": deadline });
  input.value = "";
  taskAddOrder = "";
  renderers.tasks();
  try {
    await fetch(API_URL.replace("/order","/task"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ text: text, order: order, deadline: deadline })
    });
  } catch(e) { console.error("task add failed", e); }
}

async function toggleTask(text, created, done) {
  const t = TASKS.find(x => x["Текст"] === text && x["Створено"] === created);
  if (t) { t["Статус"] = done ? "так" : "ні"; }
  renderers.tasks();
  try {
    await fetch(API_URL.replace("/order","/task/toggle"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ text: text, created: created, done: done })
    });
  } catch(e) { console.error("task toggle failed", e); }
}

async function deleteTask(text, created) {
  TASKS = TASKS.filter(x => !(x["Текст"] === text && x["Створено"] === created));
  renderers.tasks();
  try {
    await fetch(API_URL.replace("/order","/task/delete"), {
      method: "POST", mode: "cors", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ text: text, created: created })
    });
  } catch(e) { console.error("task delete failed", e); }
}
